body:
  text: 漢制考卷一宋王應麟撰周禮胥徒注此民給徭役者若今衛士矣疏衛士亦給徭役故舉漢法況之貢禹傳諸離宮及長樂宮衛可減太半寬繇役膳夫注今時美物曰珍膳酒人注奄今謂之宦人古者從坐男女沒入縣官為奴其少才知以為奚今之侍史官婢或曰奚官女疏侍史官婢舉漢法言之或曰官女者漢時有此别號案左氏晉惠公之女名妾稱為官女謂宦事秦公子亦云宦女也貢禹傳諸官奴婢十萬餘人大府注大府為王治藏之長若今司農矣疏漢時司農主府藏故史游章云司農少府國之淵司會注司會主天下之大計計官之長若今尚書疏漢之尚書亦主大計故舉以況之也成帝紀建始四年罷中書宦官初置尚書員五人職內注職內主入也若今之泉所入謂之少內疏漢之少內亦主泉所入案王氏漢官解云小官嗇夫各擅其職謂倉庫少內嗇夫之屬各自擅其條理所職主由此言之少內藏聚似今之少府但官卑職碎以少為名丙吉傳少內嗇夫白吉曰食皇孫亡詔令注云少內掖庭主府藏之官也大宰八法注鄭司農云官屬謂六官其屬各六十若今博士大史大宰大祝大樂屬大常也疏漢始叔孫通為奉常後改為大常八則注祿若今月奉也疏古者祿皆月別給之漢之月奉亦月給之九職注鄭司農云閒民謂無事業者轉移為人執事若今傭賃也九賦注賦口率出泉也今之算泉民或謂之賦此其舊名與疏漢法民年二十五已上至六十出口賦錢人百二十以為算食貨志董仲舒曰田租口賦二十倍於古貢禹傳古民亡賦算口錢起武帝征伐四夷重賦於民民産子三嵗則出口錢故民重困宜令兒七嵗去齒乃出口錢年二十乃算元帝令民産子七嵗乃出口錢鹽鐵論曰雖三十而以頃畝出稅加之以口賦更繇之役理道要訣漢髙帝每嵗人常賦百二十錢至孝文時省儉減至四十武帝事邉費廣人産子三嵗則出口錢孝宣減人算三十孝成減四十光武有産子復以三年之算關市山澤謂占㑹百物幣餘占賣國中之斥幣皆末作當增賦者若今賈人倍算矣小宰注宫刑在王宫中者之刑建眀布告之糾猶割也察也若今御史中丞疏應劭云秩千石朝㑹獨坐副二御史大夫內掌蘭臺圖籍外督刺史糾察百寮故舉漢法況之八成注鄭司農云質劑謂市中平價今時月平是也平音病傅別質劑皆今之劵書也嵗終則令羣吏致事注使齎嵗盡文書來至若今上計疏漢之朝集使謂之上計吏謂上一年計㑹文書及功狀也憲禁于王宫注憲謂表縣之若今新有法令云宰夫八職注治要若嵗計也治凡若月計也治目若今日計也贊治若今起文書草也疏起文書草乃後判決是為贊治之法治敘次序官中如今侍曹伍伯傳吏朝也疏漢時五人為伍伯長也是五人之長言傳吏朝者傳在朝羣吏諸官事務於朝也胥於什長亦然故舉漢法況之也書其能者與其良者注鄭司農云若今時舉孝廉賢良方正茂才異等疏孝廉者謂孝弟廉潔賢良即經中良者謂有賢行而良善也云方正者人雖無別行而有方幅正直者也云茂才者漢光武諱秀時號為茂才即經云能者也云異等者四科不同等級各異故云異等宫正次舍注次諸吏直宿若今部署諸廬者舍其所居寺史記秦紀衛令曰周廬設卒甚謹西京賦曰徼道外周千廬內傅胡廣曰衛士於周垣下為區廬幾其出入注鄭司農云若今時宫中有罪禁止不得出亦不得入及無引籍不得入宫司馬殿門也疏今時謂漢法言引籍者有門籍及引人乃得出入也又云司馬殿門者漢宫殿門每門皆使司馬一人守門比千石皆號司馬殿門也元帝紀令從官給事宮司馬中者得為大父母父母兄弟通籍應劭曰籍者為二尺竹牒設其年紀名字物色縣之宮門案省相應乃得入也顔師古曰司馬門者宮之外門也衛尉有八屯衛候司馬主衛士徼巡宿衛每面各二司馬故謂宫之外門為司馬門竇嬰傳太后除嬰門籍不得朝請王嘉傳為郎坐户殿門失闌免梁孝王傳梁之侍中郎謁者著引籍出入天子殿門與漢宦官亡異凡邦之事蹕注鄭司農云國有事王當出則宫正主禁絶行者若今時衛士填街蹕也疏漢儀大駕行幸使衛士填塞街巷以止行人備非常也宮伯凡在版者注鄭司農云版名籍也以版為之今時鄉户籍謂之户版以時頒其衣裘注衣裘若今賦冬夏衣疏夏時班衣冬時班裘賦班也皆賜授之義庖人共祭祀之好羞注謂四時所為膳食若荆州之䱹魚青州之蟹胥雖非常物進之孝也疏鄭見當時有之集韻蝑蟹醢四夜切外饔饗士庶子注士庶子衛王宫者若今時之饗衛士矣王尊傳正月行幸曲臺臨饗罷衛士如淳曰諸衛士更盡得代去故天子自臨而饗之和熹鄧后紀舊事嵗終當饗遣衛士注蓋寬饒傳嵗盡交代上臨饗罷衛卒是也亨人注爨今之竈疏周禮儀禮皆言爨論語王孫賈云寧媚於竈祭法天子七祀之中亦言竈自孔子已後皆言竈臘人乾肉注大物解肆乾之謂之乾肉若今凉州烏翅矣瘍醫五毒注今醫方有五毒之藥酒正五齊注泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今恬酒矣盎猶翁也成而翁翁然葱白色如今鄼白矣鄼在何反緹者成而紅赤如今下酒矣沈者成而滓沈如今造清矣疏宜成說以為地名故曹植酒賦曰宜成醴醪蒼梧縹清若馬融所云今之宜成會稽稻米清似宜成以為酒名故劉杳要雅亦以宜成為酒名二者未知孰是恬酒於五齊中為恬故以恬酒况之鄼白漢時蕭何所封地名鄼釋文即今之白醝酒宜作醝作鄼假借也也下酒謂曹床下酒其色紅赤故以緹名之案鄭下注五伯緹衣亦赤黑色也造清漢時造清熟則滓沈故以况沈齊也三酒注事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬釀接夏而成疏事酒冬釀春成以漢之醳酒况之昔為久酋亦逺久之義故以漢之酋久白酒况之但昔酒對事酒為清若對清酒則為白故云酋久白酒也晉語云味厚實昔毒酒久則毒也昔酒為久冬釀接春清酒久於昔酒自然接夏也中山郡名故魏都賦云醇酎中山沈湎千日四飲注漿今之酨漿也酏今之粥酨昨再反疏酨之言載米汁相載漢時名為酨漿內則有黍酏酏飲粥稀者之清也大祭三二中祭再二小祭一二汪益之者以飲諸臣若今常滿尊也疏言益之故常滿故以漢法况之漿人六飲注凉今寒粥若糗飯雜水也疏案內則飲內有濫無凉彼鄭云以周禮六飲較之則濫凉也紀莒之間名諸為濫言諸者非一之義內則名凉為濫參驗相當凌人治鑑注鑑如甀大口以盛氷置食物于中以禦溫氣疏漢時名為甀即今之甕是也夷槃注漢禮器制度大槃廣八尺長丈二尺深三尺漆赤中疏叔孫通前漢時作漢禮器制度多得古之周制故鄭君依而用之也周謂之夷槃漢謂之大槃是别代異名喪大記注漢禮大盤廣八尺長丈二深三尺赤中夷槃小焉籩人注籩竹器如豆者其容實皆四升疏依漢禮器制度而知也朝事之籩注鮑者於􅟺室中糗乾之出於江淮鱐者析乾之出東海疏鄭以目驗知之言􅟺室者謂􅟺土為室今河間以北煮穜麥賣之名曰逢燕人膾魚方寸切其腴以啖所貴疏引漢法證麷亦是熬煮之麥引時事證膴亦是腹腴以擬祭與啖貴者同也饋食之籩注饋食薦孰也今吉禮存者特牲少牢諸侯之大夫士祭禮也疏天子諸侯祭祀之禮亡醢人饋食之豆豚拍注鄭大夫杜子春云今河間名豚脅聲如煆鎛鹽人飴鹽注鹽之恬者今戎鹽有焉疏即石鹽是也幕人注帟王在幕若幄中坐上承塵掌次皇邸注鄭司農云皇羽覆上邸後版也𤣥謂後版屏風與染羽象鳯皇羽色以為之疏言後版者謂為大方版於坐後畫為斧文言屏風者據漢法況之無正文故言與以疑之外府掌邦布之入出注布泉也布讀如宣布之布其藏曰泉其行曰布取名於水泉其流行無不遍泉始蓋一品周景王鑄大泉而有二品後數變易不復識本制至漢唯有五銖久行王莽改貨而異作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直貨泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉徑一寸重五銖右文曰貨左曰泉直一也疏漢書食貨志周景王時患泉輕將更鑄大泉單穆公曰不可王不聽鑄大泉文曰寶貨漢興為秦泉重難用更令民鑄榆莢錢至孝文有司言榆莢三銖輕易姦詐請鑄五銖至王莽居攝變漢制更造大泉徑寸二分重一十二銖文曰大泉直五十又造契刀形如刀直五百又造錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行至莽即真罷五銖錢異作泉布多至十品其布有大布次布弟布壯布中布差布厚布幼布么布小布是為貨十品也其泉十品者莽居攝作大泉錯刀契刀即真作小錢么錢幼錢布錢壯錢天鳳年更造貨布與貨錢為十品莽以劉有金刀罷契刀錯刀從莽至漢末鄭君時見行此三者故云今存於民間也彼文貨布無有竒廣八分半足支長八分等十一字此鄭君目所覿見以義增之耳彼大泉直五十言十五者亦誤當從五十為正也王莽之大泉蓋與景王所鑄大泉亦異也愚桉武帝鑄五銖疏謂孝文作五銖誤也周語景王二十一年鑄大錢韋昭注錢者金幣之名所以貿買物通財用也古曰泉後轉曰錢單穆公云古者有母平子子權母而行然則二品之來古而然矣鄭君云錢始一品至景王有二品省之不熟耳前後漢紀武帝元狩五年行五銖錢王莽時廢光武建武十六年始行五銖錢齊孔覬曰自漢鑄五銖至宋文帝歷五百餘年不變者輕重可法得貨之宜也幣齎注鄭司農云齎或為資今禮家定齎作資司會書契版圖注書謂簿書契其最凡也版户籍也圖土地形象田地廣狹疏漢時以簿書記事至於餘物記事亦謂之簿書故舉漢法而言也漢之户籍皆以版書之故以漢法况職內凡受財者受其二令而書之注受財受於職內以給公用者二令者謂若今御史所寫下本奏王所可者書之若言某月某日某甲詔書出某物若干給某官某事下户嫁反疏御史掌贊書用財者先奏白於王王許可則御史贊王為辭下職內是其二令職內則書之為本案然後給物與之職幣以書揭之注鄭司農云揭之若今時為書以著其幣著直略反掌皮㑹其財齎注齎所給豫人以物曰齎今時詔書或曰齎計吏疏漢時考使謂之計吏有詔賜與之則曰齎引之證齎是與人物也內宰教六宫注六宫若今稱皇后為中宫矣疏漢舊儀有此事也哀帝紀中宫注皇后之宫禁其竒邪注竒邪若今媚道疏漢法有官禁云敢行媚道者謂道妖邪巫術以自衒媚故舉漢法證經內小臣隂事注隂事羣妃御見之事若今掖庭令晝漏不盡八刻白録所記推當御見者閽人掌守王宫之中門之禁注中門為外內為中若今宫闕門女祝招梗禬禳注四禮唯禳其遺象今存疏漢時招梗及襘不行唯禳一禮漢日猶存其遺象典婦功物書而揭之注鄭司農云書其賈數而著其物若今時題署物內司服褘衣揄狄闕狄注今世有圭衣者蓋三翟之遺俗疏漢時有圭衣刻為圭形綴於衣是由周禮有三翟別刻繒綴於衣漢俗尚有故云三翟遺俗也素沙注素沙者今之白縳也縳音絹今作絹字六服皆袍制以白縳為裏使之張顯今世有沙縠者名出于此疏素沙為裏無文故舉漢法而言謂漢以白縳為裏以周時素沙為裏耳縫人棺飾注漢禮器制度飾棺天子龍火黼黻皆五列又有龍翣二其戴皆加璧疏明天子加數與喪大記不同之義翣栁注書曰分命和仲度西曰栁榖度音宅疏濟南伏生書傳文度亦居也栁者諸色所聚日將沒其赤兼有餘色故云栁榖吳虞翻奏鄭𤣥解尚書違失古大篆卯字讀當為卯古栁卯同字而以為昧追師副編注副之言覆所以覆首為之飾其遺象若今步繇矣服之以從王祭祀編編列髮為之其遺象若今假紒矣服之以桑也疏漢之步繇謂在首之時行步繇動此據時目驗以曉古至今去漢久逺亦無以知之矣假紒亦是鄭之目驗以曉古至今亦不知其狀也續漢輿服志皇后入廟步搖以黃金為山題貫白珠桂枝相糾八爵九華熊虎赤羆天祿辟邪南山豐大特六獸東觀漢記章帝詔東平王蒼以光烈皇后假髻帛巾各一衣一篋遺王屨人注復下曰舄襌下曰屨古人言屨以通於復今世言屨以通於襌俗易語反與疏漢時名復下者為屨并通得下襌之屨夏采建綏注今禮家定作蕤疏謂今說禮之家蕤賔在午月一隂爻生隂氣委蕤於下故旌旗之緌亦定作蕤也媒氏注媒之言謀也謀合異姓使和成者今齊人名麴􅨠魚列反曰媒漢書注孟康曰媒酒教顔師古曰齊人名麴餅曰媒司門注司門若今城門校尉主王城十二門疏都司總監十二門官故舉漢法況之囿人注囿今之苑疏此據漢法以況古古謂之囿漢家謂之苑大司徒建邦之土地之圖注土地之圖若今司空郡國輿地圖疏案漢蕭何收秦圖籍以知天下厄塞廣逺至後漢乃有司空郡國地圖輿者車輿其前牙曲地形不可正方故云輿地圖也案職方亦云掌天下之圖注直云如今司空輿地圖不云郡國者彼以司馬主九畿并夷狄而言故不得云郡國此經云主人民之數則唯據九州之內故此注云郡國也武帝元狩六年御史大夫奏輿地圖請所立國名立齊燕廣陵三王淮南王安與左吳等按輿地圖部署兵所從入疏謂後漢乃有蓋考之未詳也光武披輿地圖指示鄧禹建武十五年封皇子大司空上輿地圖馬援曰前披輿地圖見天下郡國百有六所肅宗建初中案輿地圖令諸國户口皆等租入史記正義天為蓋地為輿故云輿地圖皂物注鄭司農云皂物柞栗之屬今世間謂柞實為皂斗日至之景注鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然疏潁川郡陽城縣是周公度景之處古跡猶存王朴曰古者植圭於陽城以其近洛也蓋尚歉其中乃在洛之東偏開元十二年遣使天下候影南距林邑北距橫野中得浚儀之嶽臺應南北弦居地之中司馬公曰日行黃道每嵗有差地中當隨而轉移故周在洛邑漢在潁川陽城唐在汴州浚儀其食者半參之一四之一注土均均邦國地貢輕重之等其率之也公之地以一易侯伯之地以再易子男之地以三易必足其國禮俗喪紀祭祀之用乃貢其餘若今度支經用餘為司農榖矣疏據漢法以況之保息六注寬疾若今癃不可事不算卒可事者半之也疏漢時癃病不可給事不算計以為士卒若今廢疾者也可事者謂不為重役輕處使之取其半功而已似今殘疾者也正治而致事注致事上其計簿疏漢時考吏謂之計吏據其使人也此言計簿據其文書也宣帝黃龍元年謂上計簿具文而已御史察計簿疑非實者按之匡衡傳郡定國界上計簿更定圖言丞相府貢禹傳郡國擇便巧史書習於計簿能欺上府者以為右職小司徒以嵗時入其數注若今四時言事疏漢承周後皆四時入其數今時白役簿皆在於冬代異時殊故有革別也大比注鄭司農云五家為比故以比為名今時八月案比是也要謂其簿疏漢時八月案比而造籍書周以三年大比未知定用何月故以漢法八月況之後漢皇后紀漢法常因八月算人漢儀注曰八月初為算賦鄉師前後之屯注鄭大夫讀屯為課殿疏當時俗有課殿之語故讀從之鄉大夫其舍者國中貴者賢者能者服公事者老者疾者皆舍注鄭司農云征之者給公上事也舍者謂有復除舍不收役事也貴者謂若今宗室及關內侯皆復也服公事者謂若今吏有復除也老者謂若今八十九十復羡卒也疾者謂若今癃不可事者復之疏四事皆若今者並舉漢法況之鹽鐵論今寬力役之政二十三始賦五十六而免所以輔耆壯而息老艾也興賢者能者注鄭司農云興賢者謂若今舉孝亷興能者謂若今舉茂才疏孝悌廉潔人之德行故以孝廉況賢者茂才則秀才也才人之技藝故以況能者也黨正以歲時涖較比注鄭司農云如今小案比疏此舉漢法言小案比對三年大比為小耳族師春秋祭酺注酺者為人物烖害之神也較人職又有冬祭馬步則未知此世所云蝝螟之酺與人鬼之步與蓋亦為壇位如雩禜云疏酺不知何神故舉漢法以況之但漢時有蝝螟之酺神又有人鬼之步神故兩言之封人注畿上有封若今時界矣疏漢時界上有封樹故舉以言之急就篇頃町界畝畦埒封置其絼注鄭司農云絼著牛鼻繩所以牽牛者今時謂之雉與古者名同疏自漢以前皆謂之絼案少儀云牛則執紖紖則絼之别名楅衡注楅設於角衡設於鼻如椵狀也疏漢時有置于犬之上謂之椵音加故舉以况衡鼓人以金錞和鼓注錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和疏錞于之名出于漢之大豫樂官其形並出彼文而知之也以金鐲節鼓注鐲鉦也形如小鍾軍行鳴之以為鼓節疏形如小鍾者亦據漢法而言也以金鐃止鼓注鐃如鈴無舌有秉執而鳴之以止擊鼓疏鐃如鈴無舌者亦約漢法而知也以金鐸通鼓注鐸大鈴也疏亦約漢法知之牛人共其牛牲之互注互若今屠家縣肉格充人展牲注鄭司農云展具也具牲若今時選牲也𤣥謂展牲若今夕牲也疏夕牲此舉漢法以況之丙吉子顯從祠髙廟至夕牲日乃使出取齊衣顔師古注未祭一日其夕展視牲具謂之夕牲載師以㕓里任國中之地注㕓里者若今云邑里居矣疏異義公羊十一稅逺近無差漢制收租田有上中下與周禮同義閭師疏劉琰問夫家之征與夫布其異如何鄭答云夫家之征者田稅如今租矣夫布者如今算斂在九賦中者也遺人十里有廬三十里有宿注廬若今野候徒有庌也宿可止宿若今亭有室矣疏此舉漢法以況義漢時野路候迎賓客之處皆有庌舍與廬相似漢法十里有亭有三老人皆有宫室故引以為況也保氏九數注鄭司農云九數方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀夕音的句股也疏方田已下皆依九章算術而言今有重差夕桀句股此漢法增之馬氏注以為今有重差夕桀夕桀亦是算術之名與鄭異案今九章以句股替旁要則旁要句股之類也少儀正義云九數之名書本多誤儒者所解方田一粟米二差分三少廣四商功五均輸六方程七贏不足八旁要九云今有重差句股者鄭司農指漢時云今世於九數之內有重差句股二篇其重差即與舊數差分一也去舊數旁要而以句股替之為漢之九數即今之九章也馬融干寶等更云今有夕桀各為二篇未知所出鄭𤣥傳通九章算術注周公所作也凡九篇方田粟米差分少廣均輸方程傍要盈不足句股馬續傳善九章算術注劉徽九章算術方田一粟米二差分三少廣四商功五均輸六盈不足七方程八句股九並無重差夕桀劉徽九章算經序伏羲氏始畫八卦作九九之術以合六爻之變記稱隸首作數周公制禮而有九數九數之流則九章是矣漢北平侯張蒼大司農中丞耿夀昌皆以善算名世蒼等因舊文之遺殘闕稱刪補故較其目則與古或異而所論者多闕語也凡望極髙測絶深而兼知其逺者必用重差句股則必以重差為率故曰重差也一方田以御田疇界域二粟米以御交質變易三裦分差也以御貴賤禀稅四少廣以御積羃方圓五商功以御功程積實六均輸以御逺近勞費七盈不足以御隱雜互見八方程以御錯糅正負九句股以御髙深廣逺梅福傳齊桓之時有以九九見者唐藝文志劉向九章重差一卷調人凡有鬭怒者成之注鄭司農云成之謂和之也和之猶今二千石以令解仇怨後復相報移徙之此其類也媒氏嫁殤注鄭司農云今時娶㑹是也司市以次叙分地注次謂吏所治舍思次介次也若今市亭然疏舉漢法而言張平子西京賦廓開九市通闤帶闠旗亭三重俯察百隧周制大胥今也惟尉注漢宫闕疏曰長安立九市其六市在道西三市在道東史記褚先生曰臣為郎與方士㑹旗亭下質劑注質劑謂兩書一札而別之也若今下手書言保物要還矣疏漢時下手書即今畫指劵與古質劑同也思次介次注思次若今市亭也介次市亭之屬別小者也量度者注若今處斗斛及丈尺也以璽節出入之汪璽節印章如今斗簡封矣疏案漢法斗簡封其形方上有封簡其內有書則周時印章上書其物識事而已左傳正義周時印已名璽但上下通用泉府以國服為之息注以其於國服事之稅為息也王莽時民貸以治産業者但計贏所得受息無過嵗什一疏此與周少異周時不計其贏所得多少據本徵利王莽時雖計本多少為定及其徵科唯據所贏多少假令萬泉嵗還贏萬泉徴一千贏五千徴五百餘皆據利徴什一也司關以節傳出之注傳如今移過所文書疏傳則過所文書文帝十二年除關無用傳張晏注傳信也若今過所也釋名曰過所至關津以示之或曰傳掌節使節皆金也注今漢有銅虎符疏證周時節用銅之意門關用符節注符節者如今宫中諸官詔符也璽節者今之印章也旌節今使者所擁節是也將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所通也疏符節已下周法無文故皆約漢法況之案太史公本紀漢文帝二年九月初與郡國守相為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡國合符符合乃聽受之竹使符者皆以竹箭五枚長五寸鐫刻篆書第一至第五張宴曰符以代古之圭璋從簡易也鄭引之者欲明漢時銅虎符本出於此也後漢杜詩上疏舊制發兵以虎符其餘徵調竹使而已遂人夫一廛注鄭司農云揚子雲有田一廛謂百畝之居也𤣥謂廛城邑之居王莽時城郭中宅不樹者謂不毛出三夫之布疏引莽時事者證廛是城郭中里宰以嵗時合耦于鋤注鋤者里宰治處也若今街彈之室於此合耦使相佐助因放而為名疏鄭以漢法況之漢時在街置室簡彈一里之民於此合耦使相助佐因放而名鋤也金石録漢都鄉正街彈碑在汝州界故昆陽城中其嵗月略可見蓋中平二年正月而其額題都鄉正街彈碑莫知其為何碑也水經魯陽縣有南陽都鄉正衛為碑平氏縣有南陽都鄉正衛彈勸碑隸釋亦以為衛彈碑蓋未考此注也酸棗令劉熊碑云愍念蒸民勞苦不均為作正彈造設門更合人耦則牛耦亦可知也疏周時未有牛耦耕至漢時搜粟都尉趙過始教民牛耕今鄭云合牛耦可知者或周末兼有牛耦至漢趙過乃絶人耦專用牛耦故鄭兼云焉山海經后稷之孫叔均始作牛耕周益公曰竊疑耕犂起於春秋之間故孔子有犂牛之言而弟子冉耕亦字伯牛月令季冬出土牛示農耕早晚賈誼新書劉向新序俱載鄒穆公曰百姓飽牛而耕暴背而耘大率在秦漢之際何待趙過過特教人耦犂共二牛費省而功倍爾旅師平頒其興積注縣官徵聚物曰興今云軍興是也疏鄭舉漢法況之興皆是聚積之義也草人土化之法注化之使美若泛勝之術也疏漢時農書有數家泛勝為上故月令注亦引泛勝藝文志農家泛勝之十八篇音凡稻人芟夷之注鄭司農說今時謂禾下麥為夷下麥言芟刈其禾於下種麥也迹人邦田之地政注田之地若今苑也掌蜃共白盛之蜃注盛猶成也謂飾牆使白之蜃也今東萊用蛤謂之義灰云疏蜃蛤在泥水之中東萊人義取以為灰故以蛤灰為義灰囿人牧百獸注備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳧鶴備焉司稼出斂法注斂法者豐年從正凶荒則損若十傷二三實除減半疏舉法以況義謂漢時十分之內傷二分三分餘有七分八分者實除減半者謂就七分八分中為實在仍減去半不稅於半內稅之以凶荒所優饒民法也槁人外內朝冗食注外朝司寇斷獄弊訟之朝也今司徒府中有百官朝㑹之殿云天子與丞相參決大事焉是外朝之存者與內朝路門外之朝也冗食者謂留治文書若今尚書之屬諸直上者疏引漢法說之謂以次當直留在朝宿不復須以食供之冗散也外內朝上直諸吏謂之冗吏亦曰散吏續漢厯志熹平四年馮光陳晃言厯元不正詔以羣臣㑹司徒府議注蔡雍集載三月九日百官㑹府公殿下東面校尉南面侍中郎將大夫千石六百石重行北面議郎博士西面户曹令史當坐中而讀詔書公議蔡雍前坐侍中西北近公卿與光晃相難問是非焉後百官志注蔡質漢儀曰司徒府與蒼龍闕對厭於尊者不敢號府應劭曰丞相舊位在長安時府有四出東西門耳國每有大議天子車駕親幸其殿殿西王侯以下更衣併存每嵗州郡聽採長吏臧否民所疾苦還條奏之是謂舉謡言舉謡言者掾屬令史都會殿上主者大言某州郡行狀周禮外朝干寶注曰禮司徒府中有百官朝㑹殿朝士注今司徒府有天子以下大㑹殿亦古之外朝漢制考卷一
