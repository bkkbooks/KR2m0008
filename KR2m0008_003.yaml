body:
  text: 漢制考卷三宋王應麟撰儀禮士冠禮所卦者注所以畫地記爻疏筮法依七八九六之爻而記之但古用木畫地今則用錢以三少為重錢重錢則九也三多為交錢交錢則六也兩多一少為單錢單錢則七也兩少一多為折錢折錢則八也案少牢云卦者在左坐卦以木故知古者畫卦以木也有司如主人服注有司羣吏有事者謂主人之吏所自辟除府史以下今時卒吏及假吏是也疏周禮三百六十官之下皆有府史胥徒不得君命主人自辟除去役賦補置之周禮皆云府史此云羣吏吏史亦一也故舉漢法為證抽上韇注韇藏策之器今時藏弓矢者謂之韇丸也疏此舉漢法為況亦欲見韜弓矢者以皮為之故詩云象弭魚服是以魚皮為矢服則此韇亦用皮也設洗直于東榮注洗承盥洗者棄水器也士用鐵榮屋翼也周制自卿大夫以下其室為夏屋水器尊卑皆用金罍及大小異疏士用鐵者案漢禮器制度洗之所用士用鐵大夫用銅諸侯用白銀天子用黃金也檀弓孔子云見若覆夏屋者矣鄭注云夏屋今之門廡漢時門廡也兩下為之故舉漢法以況夏屋兩下為之或名兩下屋為夏屋夏后氏之屋亦為夏屋鄭云卿大夫以下其室為夏屋兩下而周之天子諸侯皆四注金罍此亦案漢禮器制度尊卑皆用金罍及其大小異榮即今之摶風云榮者與屋為榮飾言翼者與屋為翅翼韎韐注今齊人名蒨為韎韐緇布冠缺項青組纓屬于缺緇纚廣終幅長六尺皮辨笄爵辨笄注缺讀如頍緇布冠無笄者著頍圍髮際結項中隅為四綴以固冠也今未冠笄者著卷幘頍象之所生也滕薛名蔮為頍纚今之幘梁也笄今之簪疏著頍圍髮際者無正文約漢時卷幘亦圍髮際故知也頍象之所生者此舉漢法以況義漢時男女未冠笄者首著卷幘之狀亦以布帛之等圍繞髮際為之漢時滕薛二國云蔮蔮卷幘之類亦遺象故為況也幘梁亦舉漢法為況幘梁之狀鄭目驗而知至今久逺亦未審也有篚注篚竹器如笭者疏舉漢法為況也緇布冠各一匴注緇布冠今小吏冠其遺象也匴竹器名今之冠箱也疏緇布冠士為初加之冠冠訖則弊之不用庶人則常著之故詩云臺笠緇撮是庶人以布冠常服者以漢之小吏亦常服之故舉為況冠箱亦舉漢法為況屨青絇注絇之言拘也以為行戒狀如刀衣鼻在屨頭疏此以漢法言之今之屨頭見有下鼻似刀衣鼻故以為況也大古冠布注白布冠者今之喪冠是也周辨殷冔夏收注其制之異亦未聞疏案漢禮器制度辨冕周禮辨師相參周之冕以木為體廣八寸長尺六寸績麻三十升布為之上以玄下以纁前後有旒尊卑各有差等天子玉笄朱紘其制可聞云未聞者但夏殷之禮亡其制與周同異亦如上未聞也士昏禮女次注次首飾也今時髲也姆注若今時乳母矣疏漢時乳母則選德行有乳者為之并使教子纚笄注纚縚髮笄今時簪也疏簪舉漢為況義被顈黼注卿大夫之妻刺黼以為領如今偃領矣疏舉漢法鄭君目驗而知至今已逺偃領之制亦無可知也爾雅黼領謂之襮注繡刺黼文以褗領婦執笄注竹器而衣者其形蓋如今之筥􅠚籚矣疏此舉漢法以況義但去今以逺其狀無以可知也鄉飲酒禮注今郡國十月行此飲酒禮疏漢時已罷諸侯之國而為郡郡有太守而封王子母弟者仍為國故云郡國也鄉朝服注今郡國行鄉飲酒之禮玄冠而衣皮辨服與禮異鄉射禮注今郡國行此禮以季春疏漢時雖無諸侯國而置郡為守其王之子弟猶名國其君曰相故鄭注禮記云如今從太守相臨之禮是也引之者證時節與周異也主人朝服注今郡國行此鄉射禮皮辨服與禮為異疏引之者欲見與周異也不及地武注武迹也中人之迹尺二寸疏無正文蓋目驗當時而言漢禮云五武成步步六尺或據此而言也中十尺注方者也用布五丈今官布幅廣二尺二寸旁削一寸疏此言十尺用布五幅幅廣二尺二寸兩畔各削一寸為縫幅各二尺在故五幅為一丈也漢法幅二尺二寸亦古制存焉故舉以為況周禮鄭志純三只只八寸二尺四寸者據繒幅也燕禮設洗當東霤注當東霤者人君為殿屋也亦南北以堂深疏漢時殿屋四向流水故舉漢以況周言東霤明亦有西霤對大夫士言東榮兩下屋故也坐行之注若今坐相勸酒大射儀同燕朝服於寢注今辟雍十月行此燕禮玄冠而衣皮辨服與禮異也疏引漢法欲見與古異者周時玄冠服則緇布衣今衣皮辨服是其異也大射儀有豐注近似豆大而卑矣疏既用豆為形還近似籩豆之豆舉漢法而知司射適次注次若今時更衣處張幃席為之聘禮釋幣於行注今時民春秋祭祀有行神古之遺禮乎疏鄭以行神無正文雖約檀弓猶引漢法為況束帛注帛今之璧色繒也疏周禮大宗伯孤執皮帛鄭注亦然束帛亦與璧色同以其相配但未知正用何色耳及郊注逺郊百里近郊各半之疏尚書君陳序云命君陳分正東郊成周鄭注周之近郊五十里今河南洛陽相去則然鄭以目驗知之以二竹簋方玄被纁裏有蓋注竹簋方者器名也以竹為之狀如簋而方如今寒具筥筥者圜此方耳疏寒具若籩人先鄭云朝事謂清朝未食先進寒具口實之籩實以冬食故謂之寒具筥圜此方者方圓不同為異也束紡注紡紡絲為之今之縳也疏鄭注周禮內司服云素紗者今之白縳也則此束紡者素紗也故據漢法況之縳息絹反聲類以為今正絹字百名以上書於策不及百名書於方注名書文也今謂之字疏鄭注論語亦云古者曰名今世曰字許氏説文亦然名者即今之文字也圭與繅皆九寸注雜采曰繅以韋衣木板飾以三色再就疏依漢禮器制度而知也但木板大小一如玉制然後以韋衣之大小一如其板卿大夫訝注訝主國君所使迎待賓者如今使者護客十六斗曰籔注今江淮之間量名有為籔者今文籔為逾論語注十六斗曰庾正義庾逾籔其數同四秉曰筥注筥穧名也若今萊易之間刈稻聚把有名為筥者公食大夫禮漿飲注酨漿也疏酨之言載以其汁滓相載故云酨漢法有此名故也膷臐膮注今時臛也覲禮斧依注依如今綈素屏風也有繡斧文所以示威也斧謂之黼疏案爾雅牖户之間謂之扆以屏風為斧文置於依地孔安國顧命傳云扆屏風畫為斧文置户牖間是也言綈素者綈赤也素白也漢時屏風以綈素為之象古者白黑斧文故鄭以漢法為況喪服冠六升注布八十縷為升升字當為登登成也今之禮皆以登為升俗誤已行久矣繐衰裳注凡布細而疏者謂之繐今南陽有鄧繐疏謂漢時南陽郡鄧氏造布有名繐櫛笄注櫛笄者以櫛之木為笄或曰榛笄有首者若今時刻鏤摘頭矣疏摘頭之物刻鏤為之此笄亦在頭而云首為大飾明首亦刻鏤之故舉漢法況之也髽注髽露紒也以麻者自項而前交於額上卻繞紒如著幓頭焉疏鄭引漢法幓頭況者古之括髮其髽之狀亦如此繩菲注今時不借也疏周時人謂之屨子夏時人謂之菲漢時謂之不借士喪禮浴衣於篋注浴衣已浴所衣之衣以布為之其制如今通裁疏布單衣漢時名為通裁故舉漢法為况渜濯注古文渜作湪荆沔之間語疏豫州人語連絇注絇屨飾如刀衣鼻在屨頭上以餘組連之疏以漢時刀衣鼻況絇在屨頭上以其皆有孔得穿繫于中而過若無絇則謂之鞮屨貝三注貝水物古者以為貨江水出焉疏漢書食貨志云五貝為朋又有大貝牡貝之等以為貨用免于房注免之制未聞舊説以為如冠狀廣一寸此用麻布為之狀如今之著幓頭矣後漢向栩好被髮著絳綃頭注綃當作幧髽于室注既去纚而以髮為大紒如今婦人露紒其象也其用麻布亦如幓頭然葵菹芋注齊人或名全菹為芋疏菹法舊短四寸者全之若長於四寸者亦切之敦注敦有足則敦之形如今酒敦既夕禮薦車注薦進也進車者象生時將行陳駕也今時謂之魂車疏鄭舉漢法況之以其神靈在焉用軸注軸輁軸也軸狀如轉轔疏此以漢法況之漢時名轉軸為轉轔薦馬纓注纓今馬鞅也疏古者謂之纓漢時謂之故舉漢法為況也池注池者象宫室之承霤以竹為之狀如小車笒衣以青布疏此鄭依漢禮而言喪大記注同知疏鄭以漢之制度而小車之箱必猶狹長齊注齊居柳之中央若今小車蓋上蕤也疏漢時小車蓋上有蕤在蓋之中央故舉以為説甸人抗重注今時有死者鑿木置食其中樹於道側由此脾析注脾讀為雞脾肶之脾疏時俗有此語故讀從之也中帶注若今之襌襂隸人注罪人也今之徒役作者也棜注今之輿也不饋于下室注下室如今之內堂正寢聽朝事疏下室既為燕寢故鄭舉漢法內堂況之士虞禮墮祭注齊魯之間謂祭為墮疏齊南魯北謂祭為墮者由墮下而祭因即謂祭為墮三個注今俗或名枚曰個音相近特牲禮注個猶枚也今俗言物數若云若干個者此讀然乾肉注如今涼州烏翅矣疏漢時乾脯似之故鄭以今曉古也主婦亦拜賔注拜之於闈門之內闈門如今東西掖門疏案爾雅釋宫云宫中之門謂之闈則闈門在宫內漢時宫中掖門在東西若人左右掖故舉以為況也鉤袒注如今擐衣也釋文作揎衣音宣疏若漢時人擐衣以露臂特牲饋食禮棜在其南注棜之制如今大木輿矣上有四周下無足疏鄭舉漢法以曉古棘心匕刻注刻若今龍頭有司徹注桃謂之歃讀如或舂或枕之枕字或作桃者秦人語也此二匕者皆有淺升狀如飯槮疏此以漢法況之舉觶注古文觶皆為爵延熹中詔較書作觶禮記曲禮乘安車注安車坐乘若今小車也疏古者乘四馬之車立乘此臣既老故乘一馬小車坐乘也庾蔚云漢世駕一馬而坐乘也請業則起請益則起注起若今摳衣前請也疏漢時受學有摳衣前請之法鄭引證之也在醜夷不爭注四皓曰陛下之等夷不以隱疾注俗語云隱疾難為醫用梜注今人或謂箸為梜提量鼓疏隱義云東海樂浪人呼容十二斛者為鼓禮不諱嫌名釋文案漢和帝名肇不改京兆郡魏武帝名操陳思王詩云修阪造雲日是不諱嫌名君天下曰天子注今漢於蠻夷稱天子於王侯稱皇帝量幣注今河東云幣帛也使某羞注羞進也古者謂候為進疏古時謂迎客為進漢時謂迎客為候椇注椇枳也有實今邳郯之東食之檀弓蟻結于四隅注殷之蟻結似今蛇文書置翣注牆柳衣翣以布衣木如攝與疏攝是漢時之扇與疑辭鄭恐人不識翣體故云覆夏屋注夏屋今之門廡也其形旁廣而卑疏殷人以來始屋四阿夏家之屋唯兩下而已無四阿如漢之門廡重霤注今宫中有承霤云以銅為之漢宣帝紀金芝産函德殿銅池中注銅池承霤也以銅為之衽每束一注衽今小要衽疏漢時呼衽為小要也厭冠注今喪冠其服未聞豐碑注斫大木為之形如石碑於椁前後四角樹之穿中於間為鹿盧下棺以繂繞天子六繂四碑前後各重鹿盧也疏案春秋天子有隧以羡道下棺所以下碑者凡天子之葬掘地以為方壙漢書謂之方中桓楹注四植謂之桓疏案説文桓亭郵表也謂亭郵之所而立表木謂之桓即今之橋旁表柱也王制大國三卿皆命於天子注命於天子者天子選用之如今詔書除吏矣制國用注如今度支經用狄鞮注今冀部有言狄鞮者史以獄成告於正注正於周鄉師之屬今漢有正平丞秦所置疏案漢書百官公卿表廷尉秦官掌刑辟有正左右監宣帝地節三年初置左右平鄭見古有正連言平耳此王制多是殷法秦則放殷置之執左道注左道若巫蠱及俗禁疏盧云左道謂邪道地道尊右右為貴故漢書云右賢左愚右貴左賤故正道為右不正道為左巫蠱案漢書武帝時江充埋桐人於太子宫是也俗禁者若前漢張竦行辟反支後漢書郭躬傳有陳伯子者出辟往亡入辟歸忌是也周尺注周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里疏鄭即以古周尺十寸為尺八尺為步則步八十寸鄭又以今周尺八寸為尺八尺為步則今步皆少於古步一十六寸也是今步別剩六十寸月令魚上冰注夏小正正月啓蟄魚陟負冰漢始亦以驚蟄為正月中疏漢之時立春為正月節驚蟄為正月中雨水為二月節春分為二月中氣至前漢之末以雨水為正月中驚蟄為二月節故律厯志云正月立春節雨水中二月驚蟄節春分中是前漢之末劉歆作三統厯改驚蟄為二月節鄭以舊厯正月啓蟄啓即驚也故云漢始亦以驚蟄為正月中但蟄蟲正月始驚二月大驚故在後移驚蟄為二月節雨水為正月中鴻鴈來注今月令鴻皆為候疏月令出有先後入禮記者為古不入禮記者為今則呂氏春秋是也先立春三日疏周法五時迎氣皆前期十日而齋散齋七日致齋三日今秦法簡省故三日也迎春注周近郊五十里疏鄭注尚書君陳序云天子近郊五十里今河南洛陽相去則然是也草木萌動注農書曰土長冒橛陳根可拔耕者急發疏案漢書藝文志農書有九家百一十四篇鄭所引農書先師以為泛勝之書也漢書注成帝時為侍郎使教田三輔也土長冒橛者謂置橛以候土侍郎按漢書注云議郎始雨水注漢始以雨水為二月節疏漢初驚蟄為正月中雨水為二月節至後來事稍變改故律厯志云雨水為正月中驚蟄為二月節由氣有參差故也省囹圄注囹圄所以禁守繫者若今别獄矣桎梏今械也疏崇精問曰獄周曰圜土殷曰羑里夏曰均臺囹圄何代之獄焦氏答曰月令秦書則秦獄名也漢曰若盧魏曰司空是也日夜分疏馬融曰書有五十刻夜有五十刻據日出入為限蔡雍以為星見為夜日入後三刻日出前三刻皆屬晝晝有五十六刻夜有四十四刻鄭康成注尚書云日中星以為日見之漏五十五刻不見之漏四十五刻與蔡較一刻也大略亦同大合樂注其禮亡今天子以大射郡國以鄉射禮代之命大尉注三王之官有司馬無大尉秦官則有大尉今俗人皆云周公作月令未通於古疏俗人謂賈逵馬融之徒皆云月令周公所作故王肅用焉為來嵗受朔日注秦以建亥之月為嵗首於是嵗終使諸侯及鄉遂之官受此法焉命大史釁龜策注周禮龜人上春釁龜謂建寅之月也秦以其嵗首使大史釁龜策與周異矣疏秦以孟冬為嵗首謂建亥月大飲蒸注其禮亡今天子以燕禮郡國以鄉飲酒禮代之臘先祖五祀左傳虞不臘矣正義月令孟冬臘門閭及先祖五祀臘之見於傳記者唯月令與此二文而已秦本紀惠王十二年初臘始皇三十一年更改臘曰嘉平蔡雍獨斷云臘者嵗終大祭縱吏民宴飲非迎氣故但送不迎應劭風俗通云案禮傳夏曰嘉平殷曰清祀周曰大蠟漢改曰臘臘者獵也田獵取獸祭先祖也此言虞不臘矣明當時有臘祭周時臘與大蠟各為一祭言漢改曰臘不蠟而為臘耳征鳥注題肩也齊人謂之擊征大射儀注齊魯之間名題肩為正曾子問公館注若今縣官宫也疏鮑遺問曰注此云公所為君所命使舍己者注雜記云公所為若今離宫别館也是二説異何張逸答曰公館若今停待者也離宫是也聘禮曰卿館於大夫大夫館於士公命人使館客亦云所為也文王世子內豎之御者注御如今小史直日矣春官釋奠于其先師注若漢禮有髙堂生樂有制氏詩有毛公書有伏生億可以為之也疏皆漢書儒林傳文億是發語之聲成均注董仲舒曰五帝名太學曰成均則虞庠近是也疏春秋繁露云成均為帝之學禮運蠟賔釋文夏曰清祀殷曰嘉平周曰蠟秦曰臘吾得夏時焉注其書存者有小正吾得坤乾焉注其書存者有歸藏疏先言坤者熊氏云殷易以坤為首故先坤後乾崇文總目歸藏隋志有十三篇今但存初經齊母本著三篇耐以天下為一家注耐古能字俗書世異古字時有存者則亦有今誤矣疏案説文云耐者鬚也鬚謂厮下之毛象形字也古者犯罪以髠其鬚謂之耐罪故字從寸寸為法也不虧形體猶堪其事故謂之耐漢書惠帝紀中具有其事古之能字為此耐字取堪能之義後來乃假借鱉三足為能今書或有作耐字者此耐以天下為一家及樂記云人不耐無樂仍作耐字是古字時有存者亦有誤不安寸直作而字則易屯彖利建侯而不寧及劉向説苑能字皆為而也鄭注樂記耐古能字後世變之此獨存焉古以能為三台字兩注雖異其意同也還相為宫注終於南呂更相為宮凡六十也疏諸本及定本多作終於南事則是京房律法禮器棜禁注禁如今方案隋長局足髙三寸疏案漢禮器制度而知隋他果反門外缶門內壺君尊瓦甒注壺大一石瓦甒五斗疏漢禮器制度文也或素或青注變白黑言素青者秦二世時趙髙欲作亂或以青為黑黑為黃民言從之至今語猶存也疏即鹿馬之類也經禮三百曲禮三千注經禮謂周禮也周禮六篇周官有三百六十曲猶事也事禮謂今禮也禮篇多亡本數未聞其中事儀三千疏漢孝文帝時求得周官不見冬官一篇乃使博士作考工記補之郊特牲明酌也注明酌者事酒之上也名曰明者事酒今之醳酒皆新成也疏古之事酒正是漢之醳酒內則紛帨注紛帨拭物之巾也今齊人有言紛者笄注笄今簪也滫瀡注秦人溲曰滫齊人滑曰瀡敦牟注牟讀曰堥釋文齊人呼土釡為牟疏敦則周禮有玉敦今之柸盂也隱義曰堥土釜也今以木為器象土釜之形介婦注雖有勤勞不敢掉磬疏庾氏云齊人謂之差訐崔氏云北海人謂相激之事為掉磬隱義云齊人謂相絞訐為掉磬三牲用藙注藙煎茱萸也漢律會稽獻焉疏賀氏云今蜀郡作之九月九日取茱萸折其枝連其實廣長四五寸一升實可和十升膏名之藙也魚去乙注今東海鰫魚有骨名乙在目旁狀如篆乙食之鯁人不可出麋鹿魚為菹注今益州有鹿􅖖者近由比為之矣􅖖於偽反疏益州人有將鹿肉畜之􅖖爛謂之鹿􅖖與稻米為酏注狼臅膏臆中膏也以煎稻米則似今膏􅖸矣此周禮酏食也􅖸之然反又音贊疏漢時膏􅖸以膏煎稻米鄭舉時事以説之玉藻搢珽注相玉書曰珽玉六寸明自照纊緼注纊謂今之新綿也緼謂今纊及舊絮也而素帶終辟大夫素帶辟垂士練帶率下辟注而素帶終辟謂諸侯也諸侯不朱裏合素為之如今衣帶為之下天子也大夫亦如之率練也士以下皆襌不合而繂積如今作幧為之也凡君召以三節注今漢使者擁節明堂位副褘注副首飾也今之步搖是也疏副是首飾以其覆被頭首漢之步搖亦覆首疏屏注屏謂之樹今浮思也刻之為雲氣蟲獸如今闕上為之矣疏漢時謂屏為浮思故云今浮思解者以為天子外屏人臣至屏俯伏思念其事案匠人注云城隅謂角浮思也漢時東闕浮思災以此諸文參之則浮思小樓也故城隅闕上皆有之然則屏上亦為屋以覆屏牆故稱屏曰浮思或解屏為闕也古詩云雙闕百餘尺則闕於兩旁不得當道與屏別也大路殷路也注大路木路也漢祭天乘殷之路今謂之桑根車也簨虛注垂五采羽於其下樹於簨之角上疏案漢禮制度而知也楬豆注齊人謂無髮為秃楬大傳繫之以姓而弗別注繫之弗別謂若今宗室屬籍也疏漢之同宗有屬籍則周家繫之以姓是也少儀籥注籥如笛三孔疏案漢禮器知之學記扞格注格讀如凍􅏖之􅏖疏今人謂地堅為􅏖樂記不殈注今齊人語有殈者治亂以相注今齊人或謂粳為相訊疾以雅注雅亦樂器名也狀如漆筒中有椎疏以漢時制度而知也喪大記食粥於盛注盛謂今時杯杅也紞注紞以組類為之綴之領側若今被識矣疏領為被頭側謂被旁識謂記識畫翣注漢禮翣以木為筐廣三尺髙二尺四寸方兩角髙衣以白布畫者畫雲氣其餘各如其象柄長五尺魚躍拂池注以銅為魚縣於池下疏亦參漢之制度而知也大夫士以咸注今齊人謂棺束為緘繩雜記使某實注實當為至此讀周秦之人聲之誤也素沙注素沙若今紗縠之帛也六服皆袍制不襌以素紗裏之如今袿袍襈重繒也疏袍制謂通衣裳有表有裏似袍漢時有袿袍其袍下之襈以裏繒為之繭衣裳注若今大襡也公館者公宫與公所為也注公所為君所作離宫別館也有司官陳器皿注器皿其本所齎物也律棄妻卑所齎卑必利反束五兩注今謂之匹猶匹偶之云與紃以五采注紃施諸縫中若今時絛也祭法七祀五祀注司命與厲其時不著今時民家或春秋祠司命行神山神門户竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山為之謬乎疏漢時人民嫌惡厲巫祝之人意以厲神是厲山氏之鬼為之七廟疏其主之制案漢儀髙帝廟主九寸前方後圓圍一尺后主七寸春秋正義衛次仲云右主八寸左主七寸廣厚三寸穿中央達四方也范寧云天子主長尺二寸諸侯主長一尺也白虎通云納之西壁大夫以下成羣立社曰置社注大夫不得特立社與民族居百家以上則共立一社今時里社是也郊特牲曰唯為社事單出里郊特牲疏周法百家以上得立社其秦漢以來雖非大夫民二十五家以上則得立社故云今之里社又鄭志云月令命民社謂秦社也自秦以下民始得立社也中庸栽者培之注今時人名草木之殖曰栽築牆立板亦曰栽一戎衣注衣讀為殷聲之誤也齊人言殷聲如衣虞夏商周氏者多矣今姓有衣者殷之胄與仁者人也注人也當讀如相人偶之人以人意相存問之言緇衣其出如綸注綸今有秩嗇夫所佩也疏案漢百官公卿表十里一亭十亭一鄉鄉有三老有秩嗇夫漢書云張敞以鄉有秩補太守卒史朱邑為桐鄉嗇夫續漢百官表鄉置有秩郡所置其鄉小者縣所署嗇夫案此有秩嗇夫職同但隨鄉大小故名異耳名雖異其所佩則同張華云綸如宛轉繩後漢仲長統傳身無半通青綸之命注十三州志曰有秩嗇夫得假半章印續漢輿服志曰百石青紺綸一采宛轉繆織長丈二尺説文綸青絲綬又爾雅注云綸今有秩嗇夫所帶糾青絲綸資冬祈寒注資當為至齊魯之語聲之誤也祈之言是也齊西偏之語也周田觀文王之德注古文為割申勸寧王之德今博士讀為厥亂勸寧王之德三者皆異古文似近之問喪雞斯注當為笄纚今時始喪者邪巾貊頭笄纚之存象也深衣續衽鉤邊注鉤邊若今曲裾也疏鄭以後漢之時裳有曲裾故以續衽鉤邊似漢時曲裾今時朱衣朝服從後漢明帝所為則鄭云今曲裾者是今朝服之曲裾也爾雅裳削幅謂之纀注削殺其幅深衣之裳曲夾如矩以應方注古者方領如今小兒衣領疏鄭以漢時領皆嚮下交垂故云古者方領似今擁咽故云若今小兒衣領但方折之也鄉飲酒義注謂之鄉者州黨鄉之屬也或則鄉之所居州黨鄉大夫親為主人焉如今郡國下令長於鄉射飲酒從太守相臨之禮也疏謂郡治之下及王侯有國治之下滿萬户以上之令不滿萬户之長於己縣或射或飲酒則從郡之太守及主國之相來自行禮相監臨之儀不用令長禮也令長射而飲酒似州長黨正也太守與相來監臨似鄉大夫監臨也射義諸侯嵗獻貢士於天子注嵗獻獻國事之書及計偕物也疏漢時謂郡國送文書之使謂之為計吏其貢獻之物與計吏俱來故謂之計偕物也偕俱也表記衣服以移之注移讀如水汜移之移昌氏反移猶廣大也漢制考卷三
