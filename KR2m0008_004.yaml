body:
  text: 漢制考卷四宋王應麟撰詩小星抱衾與裯箋裯牀帳也疏漢世名帳為裯蓋因於古鄭志今人名帳為裯願言則嚏箋今俗人嚏云人道我此古之遺語也涇以渭濁注涇渭相入而清濁異疏漢書溝洫志云涇水一石其泥數斗潘嶽西征賦云清渭濁涇是也方之舟之注舟船也疏舟者古名也今名船易曰利涉大川乘木舟虛注云舟謂集板如今自空大木為之曰虛即古又名曰虛總名皆曰舟副笄六珈箋珈之言加也副既笄而加飾如今步搖上飾古之制有所未聞疏步搖副之遺象故可以相類也古今之制不必盡同故言古之制有所未聞以言六珈必飾之有六但所施不可知漸車帷裳箋帷裳童容也疏巾車云重翟厭翟安車皆有容蓋鄭司農云容謂襜車山東謂之裳幃或曰童容以幃障車之傍如裳以為容飾故或謂之幃裳或謂之童容其上有蓋四傍垂而下謂之襜故雜記曰其輤有裧注云裧謂鱉甲邊緣是也然則童容與襜別司農云謂襜車者以有童容上必有襜故謂之為襜車也適子之館兮箋卿士所之之館在天子之宫如今之諸廬也方秉蕳兮注蕳蘭也疏澤蘭廣而長節節中赤髙四五尺漢諸池苑及許昌宫中皆種之可著粉中藏衣著書中辟白魚齊子豈弟箋豈讀當為闓弟古文尚書以弟為圛圛明也疏古文尚書即今鄭注尚書是也無以悌為圛之字唯洪範稽疑論卜兆有五曰圛注云圛者色澤光明蓋古文作悌今文作圛賈逵以今文較之定以為圛故鄭以賈氏所奏從定為圛於古文則為悌有梟萃止疏漢供御物各隨其時唯梟冬夏尚施之以其美故也刺朝廷之不知疏漢魏稱人主或云國家或言朝廷古今同也蒸然汕汕注汕汕樔也箋樔者今之撩罟也錫我百朋箋古者貨貝五貝為朋疏漢書食貨志大貝牡貝么貝小貝不成貝為五小貝以上四種各二貝為一朋而不成者不為朋王莽多舉古事而行五貝搏獸于敖箋敖鄭地今近滎陽田畯至喜箋田畯司嗇今之嗇夫也疏田畯田官在田司主稼穡故謂之司嗇漢世亦有此官謂之嗇夫故言今之嗇夫也既種既戒箋至孟春土長冒橛陳根可拔而事之疏出於農書邪幅在下注幅逼也箋邪逼如今行縢也逼束其脛自足至膝故曰在下疏左傳曰帶裳幅舄內則亦單云逼則此服名逼而已杜鄭皆云今之行縢然則邪纒於足謂之邪幅酌言酬之箋主人既卒酢爵又酌自飲卒爵復酌進賔猶今俗人勸酒疏俗人亦先自飲而後勸人韓奕箋梁山今左馮翊夏陽西北疏漢於長安畿內立三郡謂之三輔京兆在中馮翊在東扶風在西外郡之長謂之太守此三輔者謂之京兆尹左馮翊右扶風左右猶外郡之名太守也計此止須言馮翊耳不須言左但漢書稱馮翊扶風之人皆并言左右故鄭亦連言左范曄後漢書始於馮翊扶風之人不言左右召旻彼疏斯稗箋米之率糲十稗九鑿八侍御七疏九章粟米法云粟率五十糲米三十稗二十七鑿二十四侍御二十一鞉磬柷圉疏臯陶謨云合止柷敔注云柷狀如漆筒中有椎合之者投椎於其中而撞之敔狀如伏虎背上刻之所以止鼓謂之止釋樂云所以鼓柷謂之止所以鼓敔謂之籈郭璞云柷如漆筒方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名也敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名也此等形狀蓋依漢之大豫樂而知之栒簨圉敔古今字耳簫管備舉箋簫編小竹管如今賣餳者所吹也管如笛併而吹之疏賣餳之人吹簫以自表也史記稱伍子胥鼓腹吹簫乞食吳市亦為自表異也侯彊侯以箋以謂閒民今時傭賃也以開百室箋百室者出必共洫間而耕入必共族中而居又有祭酺合醵之歡疏族師職云春秋祭酺注云酺者為人物災害之神也古書酺為步因此祭酺聚錢飲酒故後世聽民聚飲皆謂之酺漢書每有嘉慶令民大酺五日是其事也允猶翕河箋河自大陸之北敷為九疏鄭志答張逸云巨鹿今名廣河澤然則河從廣河之北分為九也禹貢兖州九河既道鄭注云九河之名徒駭太史馬頰覆釜胡蘇簡潔鉤盤鬲津周時齊桓公塞之同為一今河間弓髙以東至平原鬲津往往有其遺處焉鄭以古之九河皆在兖州之界於漢乃冀州域耳思樂泮水箋辟雍者築土雍水之外圓如璧四方來觀者均也疏辟雍之宫內有館舍外無牆院也後漢書明帝正坐自講諸儒問難於前冠帶搢紳之人圜橋門而觀聽者蓋億萬計是由外無牆院故得圜門觀之也犧尊將將注犧尊有沙飾也疏春官司尊彛作獻尊鄭司農云獻讀為犧犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊此傳言犧尊者沙羽飾與司農飾以翡翠意同則皆讀為娑傳言沙即娑之字也阮諶禮圖云犧尊飾以牛象尊飾以象於尊腹之上畫為牛象之形王肅云將將盛美也大和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊然則象尊尊為象形也王肅此言以二尊形如牛象而背上負尊皆讀犧為羲與毛鄭義異自彼氐羌箋氐羌夷狄國在西方者也疏氐羌之種漢世仍存其居在秦隴之西書科斗書廢已久正義亡新使甄豐較定六書一曰古文孔子壁內書也孔子壁內古文即蒼頡之體故鄭𤣥云書初出屋壁皆周時象形文字今所謂科斗書以形言之為科斗指體即周之古文若於周時秦世所有至漢猶當識之不得云無能知者堯典正義刻漏漢初率九日增減一刻和帝時待詔霍融始請改之古時真厯遭戰國及秦而亡漢存六厯雖詳於五紀之論皆秦漢之際假託為之實不得正舜典璣衡正義璣為運轉衡為橫簫運璣使動於下以衡望之是王者正天文之器漢世以來謂之渾天儀者是也蔡雍天文志云言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜絶無師說周髀術數具在考驗天象多所違失故史官不用惟渾天近得其情今史所用候臺銅儀則其法也宣帝時耿壽昌始鑄銅為之象史官施用焉後漢張衡作靈憲以說其狀史記索隱益部耆舊傳云落下閎待詔太史於地中轉渾天六宗正義續漢書云安帝元初六年立六宗祠於洛陽城西北亥地祀比大社金作贖刑注黃金正義此傳黃金呂刑黃鐵皆是今之銅也古之贖罪者皆用銅漢時改用黃金但少其斤兩令與銅相敵後魏以金難得合金一兩收絹十匹今律復依古贖銅程氏曰漢世以金價計贓故謂十金法重不忍相暴章益稷柷敔搏拊正義柷敔之狀經典無文漢初以來學者相傳皆云柷如漆桶中有椎柄敔如伏虎背上有刻漢禮器制度及白虎通其說皆為然摶拊形如鼓以韋為之實之以糠擊之以節樂漢初相傳為然禹貢壺口梁岐正義髙祖入咸陽蕭何先收圖籍則秦焚詩書圖籍皆在孔君去漢初七八十年耳身為武帝博士必當具見圖籍其山川所在必是驗實而知壺口在冀州梁岐在雍州當時疆界為然也既修太原注髙平曰太原今以為郡名正義即平陽縣島夷正義孔讀鳥為島是海中之山九章算術所云海島邈絶不可踐量是也黑水正義地理志益州郡故滇王國也武帝元封二年始開為郡郡內有滇池縣縣有黑水祠五子之歌六馬正義經傳之文惟此言六馬漢世此經不傳餘書多言駕四者春秋公羊說天子駕六毛詩說天子至大夫皆駕四許慎案王度記云天子駕六鄭𤣥以周禮校人養馬一師四圉四馬曰乘康王之誥云皆布乘黃朱以為天子駕四漢世天子駕六非常法也石慶為太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬夏社正義漢世儒者說社稷有二左傳說社祭勾龍稷祭柱棄惟祭人神而已是孔之所用孝經說社為土神稷為榖神勾龍柱棄是配食者也是鄭之所從咸有一德七世之廟正義王肅等以受命之王是初基之王故立四廟庶子王者謂庶子之後自外繼立雖承正統之後自更別立己之髙祖已下之廟猶若漢宣帝別立戾太子悼皇考廟之類也微子今殷民乃攘竊神祇之犧牷牲用注盜天地宗廟牲用正義漢魏以來著律皆云敢盜郊祀宗廟之物無多少皆死為特重故也泰誓正義漢書婁敬說髙祖云武王伐紂不期而會盟津之上者八百諸侯僞泰誓有此文不知其本出何書也武帝時董仲舒對策云書曰白魚入于王舟有火復于王屋流為烏周公曰復哉復哉今引其文是武帝之時已得之矣牧誓羌髳微注羌在西蜀叟髳微在巴蜀正義左思蜀都賦云三蜀之豪時來時往是蜀都分為三羌在其西故云西蜀叟叟者蜀夷之別名巴在蜀之東偏漢之巴郡所治江州縣也後漢興平元年馬騰劉範謀誅李傕益州牧劉焉遣叟兵助之是蜀夷有名叟者也武成正義漢書律厯志引武成篇與此經不同彼是焚書之後有人僞為之漢世謂之逸書後又亡其篇召誥攻位于洛汭注治都邑之位於洛水北今河南城也正義漢書地理志河南郡治在洛陽縣河南城別為河南縣成王既伐東夷注海東諸夷駒麗扶餘馯貊之屬正義此皆於孔君之時有此名漢書有髙駒麗扶餘韓馯即彼韓也費誓淮夷徐戎注此戎夷帝王所羈縻統緒故錯居九州之內秦始皇逐出之正義漢時內地無戎夷者秦始皇逐出吕刑輸而孚注謂上其鞠劾文辭正義漢世問罪謂之鞫斷獄謂之劾善敹乃甲胄注甲鎧胄兜鍪正義經典皆言甲胄秦世已來始有鎧兜鍪之文古之作甲用皮秦漢已來用鐵鎧鍪二字皆從金蓋用鐵為之因以作名我惟築注攻敵壘距堙之屬正義兵法攻城築土為山以窺望城內謂之距堙畢命正義漢書律厯志云畢命豐刑曰惟十有二年六月庚午朏王命作策書豐刑此僞作者冏命大僕正正義與君同車最為親近故春秋隨侯寵少師以為車右漢書文帝愛趙同命之為御康誥正義周官鄰保以比伍相及而趙商疑而發問鄭答云周禮太平制此為居殷亂而言今案康誥所云以骨肉之親得相容隱故左傳云父子兄弟罪不相及周禮所云據疏人相督率之法以相連獲罪故今之律令大功已上得相容隱以其罪有相及是也鹽鐵論文學曰自首匿相坐之法立骨肉殘廢而刑罪多論語服周之冕正義阮諶三禮圖漢禮器制度云冕制皆長尺六寸廣八寸天子以下皆同沈引董巴輿服志云廣七寸長尺二寸應劭漢官儀云廣七寸長八寸沈又云廣八寸長尺六寸者天子之冕廣七寸長尺二寸者諸侯之冕廣七寸長八寸者大夫之冕但古禮殘缺未知孰是司馬彪漢輿服志云孝明帝永平二年初詔有司采周官禮記尚書之文制冕皆前圎後方朱裏𤣥上前垂四寸後垂三寸天子白玉珠十二旒三公諸侯青玉珠七旒卿大夫黑玉珠五旒皆有前無後此則漢法耳傳不習乎釋文鄭注云魯讀傳為専今從古案闕周之本以齊古讀正凡五十事鄭本或無此注者然皇覽引魯讀六事則無者非也寢衣孔曰今之被也孟子孝文欲廣遊學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已劉歆曰天下衆書往往頗出皆諸子傳說猶廣立於學官為置博士人皆謂我毁明堂注謂泰山下明堂本周天子東巡狩朝諸侯之處也太誓曰我武惟揚注太誓古尚書百二十篇之時太誓也今之尚書太誓篇後得以充學故不與古太誓同諸傳記引太誓皆古太誓也事舜於畎畝之中注孟子時尚書凡百二十篇逸書有舜典之敘亡失其文孟子諸所言舜事皆堯典及逸書所載皆去其籍注今周禮司祿之官無其職是則諸侯皆去之故使不復存也庶人在官者注食祿之等差由農夫有上中下之次亦有此五等若今之斗食佐史除吏也國語祭公謀父曰日祭注日祭祭於祖考謂上食也近漢亦然土乃脈發注農書曰春土冒橛陳根可拔耕者急發律所以立均出度也注均者均鍾木長七尺有弦繫之以均鍾者度鍾大小清濁也漢大豫樂官有之宗室之謀不過宗人注此宗人則上宗臣也亦用同姓若漢宗正用諸劉矣被羽先升注羽鳥羽繫於背若今軍將負眊矣執枹鼓立於軍門注軍門立旌為門若今牙門矣屏攝之位注屏屏風也攝形如今要扇皆所以分別尊卑為祭祀之位近漢亦然左傳巡羣屏攝注祭祀之位正義鄭衆云攝束茅以為屏蔽盟于宋候遮扞衛不行注候候望遮遮罔也晝則候遮夜則扞衛扞衛謂羅闉狗附也張羅闉去壘五十步而陳周軍之前後左右彉弩注矢以誰何謂之羅闉又二十人為曹輩去壘三百步畜犬其中或視前後或視左右謂之狗附皆昏而設明而罷候遮二千人居狗附處以視聽候望明而設昏而罷右執殤宫注若今世云能使殤也巴浦之犀犛兕象注今象出徼外其三獸則荆交有焉億醜注十萬曰億古數也今人乃以萬萬為億追而豫之璽書注古者大夫之印亦稱璽左傳正義蔡雍獨斷云璽印也信也天子璽白玉螭虎紐古者尊卑共之衛宏云奉以前民皆以金玉為印唯其所好自秦以來唯天子之印獨稱璽又以玉羣臣莫敢用也趙語夫差衣水犀之甲者億有三千注所謂賢良也若今備衛士公羊春秋隱元年會猶最也注最之為言聚若今聚民為投最如勿與而已矣注如即不如齊人語也二年無聞焉爾注春秋其說口授相傳至漢公羊氏及弟子胡毋生等乃始記於竹帛故有所失也昉於此乎注昉適也齊人語五年登來之也注登讀言得來得來之者齊人語也齊人名求得為得來作登來者其言大而急由口授也百金之魚注百金猶百萬也古者以金重一斤若今萬錢矣桓二年纍也注齊人語也五年㤜也注㤜者狂也齊人語七年焚之者何樵之也注樵之齊人語六年化我也注行過無禮謂之化齊人語也莊十二年注脰頸也齊人語二十年注瘠病也齊人語也二十八年伐者為客注伐人者為客讀伐長言之齊人語也伐者為主注見伐者為主讀伐短言之齊人語也三十一年漱浣注無垢加功曰漱去垢曰浣齊人語也僖元年注輈小車轅冀州以北名之云爾十年踊為文公諱也注踊豫也齊人語若關西言渾矣三十三年詐戰注詐卒也齊人語也文十三年往黨注黨所也所猶時齊人語也十五年筍將而來注筍者竹箯一名編輿齊魯以北名之曰筍宣六年荷畚注畚草器若今市所量榖者是也齊人謂之鍾膳宰注主宰割殺犧者若今大官宰人成二年踊于掊而窺客注凡無髙下有絶加躡板曰掊齊人語十五年魯人徐傷歸父之無後也注徐者皆共之辭也關東語襄五年往殆乎晉注殆疑疑讞于晉齊人語十六年君若贅旒然注若今俗名就壻為贅壻矣三十年更宋之所喪注如今俗名解浣衣復之為更衣昭二十五年再拜顙注顙者猶今叩頭矣定元年不蓑城注若今以草衣城是也哀六年于諸其家注于諸置也齊人語也十二年用田賦注若今漢家斂民錢以田為率矣說文漢律曰祠䃾司命䃾卑履切以豚祠司命漢律會稽獻􅱣一斗魚既切煎茱萸漢令曰張百人車者切距也漢令鬲從瓦􅏘聲漢令曰蠻夷長有罪當殊之漢律令簞小筐也漢律能捕豺貀購百錢漢律會稽郡獻鮚醬三斗蚌也巨乙切漢律曰婦告威姑籕文繒揚雄以為漢律祠宗廟丹書告漢律民不繇資錢二十二漢律曰綺絲數謂之絩治小切布謂之總綬組謂之首漢律曰疁田茠草漢律曰及其門首灑㳻漢令蠻夷卒有相主切絆前兩足也漢令解衣耕謂之襄漢律曰賜衣者縵表白裏漢律名船方長為舳艫漢律齊人豫妻婢姦曰姘左傳注漢律淫季父之妻曰報漢律曰見姅變不得侍祠樂浪挈令織從糸從式臣鉉等曰挈令蓋律令之書也尉律學僮十七已上始試諷籀書九千字乃得為吏又以八體試之郡移太史并課最者以為尚書史書或不正輒舉劾之徐鍇曰尉律漢律篇名明堂月令𤣥鳥至之日祠于髙禖季夏燒剃數將僟終舫人習水酎三重醇酒也明堂月令曰孟秋天子飲酎對或從士漢文帝以為責對而為言多非誠對故去其口以從士也秦漢之初侍中冠鵔鸃冠漢中有朐䏰縣地下多此蟲因以為名符信也漢制以竹長六寸分而相合古者貨貝而寶龜周而有泉至秦廢貝行錢秦以罪為罪字秦以罪似皇字改為罪漢令有髳長秦謂民為黔首黑色也周謂之黎民漢有挏馬官作馬酒後漢長沙王始煮草為䕩東齊壻謂之倩今俗以始生子為鼻子今逐疫有䫏頭祆胡神也僧浮屠道人也塔西域浮屠也律厯書名五星為五步洛陽名弩曰弲㱾改大剛卯以逐精鬼闕二字名引弓控弦奭召公名史篇名醜徐鍇曰史篇所作蒼頡十五篇也安定朝那有湫泉今鹽官入水取鹽為掊鷮走鳴長尾雉也乘輿以為防釳著馬頭上角􅗧狀如豕角善為弓出胡休多國羌人所吹角屠以驚馬也羌笛三孔潁川人名小兒所書寫為笘古者玉琯舜之時西王母來獻其白琯前零陵文學姓奚於伶道舜祠下得笙玉琯夫以玉作音故神人以和鳯皇來儀也祕書從戍祕書說日月為易象隂陽也揚雄說以為古理官決罪三日得其宜乃行之從晶從宜亡新以為疊從三日太盛改為三田鬱鬯百草之華逺方鬱人所貢芳草合釀之以降神鬱今鬱林郡也楢柔木也工官以為耍輪榰柱砥古用木今以石櫑龜目酒尊刻木作雲雷象蜀人聞子巂鳴皆起云望帝春分而禾生日夏至晷景可度禾有秒秋分而秒定律數十二秒而當一分十分而寸其以為重十二粟為一分十二分為一銖故諸程品皆以禾十髮為程一程為分十分為寸布之八十縷為稯五稯為秭二秭為秅右扶風有五畤好畤鄜畤皆黃帝時祭或曰秦文公立也司馬相如說淮南宋蔡舞嗙喻也盬河東鹽地袤五十一里廣七里周百十六里安定有鹵縣東方謂之斥西方謂之鹵鄈河東臨汾地即漢之所祭后土處𢎞農謂裙帔也幏南郡蠻夷賨布幡書兒拭觚布也今鹽官三斛為一帣居倦反中婦人手長八寸謂之咫周尺也俯太史卜書俯仰字如此皓南山四皓白首人也嵞會稽山一曰九江當嵞也民以辛壬癸甲嫁娶甘氏星經曰太白上公妻曰女媊女媊居南斗食厲天下祭之曰明星冬至後三戌臘祭百神闕皮有闕出樂浪車闕神爵四年初捕收輸考工膢楚俗以二月祭飲食也一曰祈穀食新曰離膢周制天子地方千里分為百縣縣有四郡故春秋傳曰上大夫受郡是也至秦初置三十六郡以監其縣周景王作洛陽誃臺尺氏切揚雄賦響若氏隤承㫖切薉貉中女子無褲以帛為脛空用絮補核名曰繜衣狀如䄡䄖召上書者汝南許沖詣左掖門㑹令并齎所上書十月十九日中黃門饒喜已詔書賜召陵公乘許沖布四十匹即日受詔朱雀掖門敕勿謝漢制考卷四
