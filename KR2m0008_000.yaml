front:
  text: 欽定四庫全書史部十三
  hash: sha256:37715509aef7f3494164bc585a87d8624d4b4517ea757749fe3b4d88b8516ad7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0008_WYG_000-1a, image: WYG0609/WYG0609-0779a.png}
body:
  text: 漢制攷政書類一通制之屬提要臣等謹案漢制攷四卷宋王應麟撰應麟字伯厚晚年自號深寧叟其先浚儀人南渡後遂家於鄞縣淳祐元年進士寶祐四年又中博學宏詞科度宗時官至禮部尚書是編因兩漢書諸志於當時制度多詳於大端畧於細目困摭采漢儒經註及説文諸書所載鈎稽排纂以補其遺頗足以資考證又以唐時賈孔諸疏去古已逺方言土俗時異名殊所謂某物如今某物某事如今某事者徃徃循文笺釋於舊文不必悉符如周禮疏不知歩繇假紒及五夜儀禮疏不知偃領之類不一而足應麟皆為一一訂辨旁引證明又周禮太史職注云太史抱式疏謂占文謂之式應麟則别引藝文志羡門式法以觧之考式者候時之儀器史記日者傳旋式正棊漢書王莽傳天文郎按式於前日時加某皆指此器所引亦較舊義為長非但抄撮舊文無所别擇其中偶失考定者如周禮士師職注云三公出城郡督郵盜賊道盖漢時郡掾分部屬縣為督郵其分治各曹者亦名督郵故朱博傳云為督郵書掾此督郵盗賊盖掾主捕盜賊者其不加掾字猶巴郡太守張納碑隂書督盗賊枳李街耳以此職又主為三公𨗳行故云督郵盜賊導盖道與導古字通也賈公彦疏乃謂使舊為盜賊之人督察郵行徃來於義為誤應麟沿用其説未免千慮之一失要其大致精核具有依據較南宋末年侈空談而鮮寔徴者其分量相去逺矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀漢制攷自序漢制載於史者先儒攷之詳矣其見他書者未之攷也嘗謂法始乎伏羲而成乎堯三代損益至周大備夫子從周與從先進之言所謂百世可知者其法著于春秋東遷之初先王典章槩有存者義和秬鬯之賚王命猶重也司徒緇衣之美王官猶賢也祭仲論京不度過制之城猶未衆也無駭卒始請族世官之敝猶未逺也泰山有祊則廵守之蹟猶可復也九宗五正有後則封建之制猶可尋也師服之言建國臧僖伯之諫觀魚則據經守古之士猶多也春秋何為而作乎宰咺歸賵天衷民彛大泯亂春秋所以始歟於獻六羽於稅畆皆曰初於丘甲於三軍皆曰作於南門於雉門及兩觀皆曰新作夫子蓋傷之也秦作西畤臚於郊祀魯惠公請郊禘史角實往而祀禮始僣矣其後齊作内政而兵制變晉作爰田而田制變晉作執秩而官制變鄭鑄刑書而刑制變大夫奏肆夏季氏旅泰山晉不知殽烝魯不知尚羔禮㡬亡矣然名卿大夫講聞故實三代文獻藹如也納鼎有諫觀社有諫申繻名子之對里革斷罟之規御孫别男女之贄管仲辭上卿之饗栁下季之述祀典單襄公之述夏令秩官魏綘之述夏訓虞箴郯子能言紀官州鳩能言七律子革倚相能誦祈招懿戒觀射父之陳祭祀閔馬父之稱商頌格言猷訓粲然可暏齊虞人之守官魯宗人之守禮懔懔秋霜夏日之嚴劉子所云天地之中子産所云天地之經胥臣敬徳之聚晏子禮之善物又皆識其大者綂紀相承淵源相續得夏時坤乾見易象魯春秋而知三代之禮所以扶持於未墜者豈一人之力哉戰國去籍之餘孟子言井地曰大畧言班爵禄曰聞其畧言諸侯䘮禮曰未學而嘗聞若其宏綱丕式因畧而致詳推舊而為新聖人復起不能易也春秋大復古譏變古井牧變而阡陌畿服變而郡縣車乗變而歩騎什一變而箕斂佩玉變而帶劔簋席變而杯案生民之理有窮則聖王之法可改古其不可復乎是意唯太史公知之於夏殷紀舉孔子正夏時善殷輅卓然見損益之要指於髙帝紀曰朝以十月車服黃屋左纛葢歎其襲秦也漢之止於為漢自髙帝之襲秦始雖然兩漢之制文中子奚取焉吁三代逺矣漢詔令人主自親其文猶近於書之典誥也郎衞執㦸之用儒生猶近於王宮之士庶子也司徒府有百官朝會殿以決大事猶近於外朝之詢衆也牧守有子孫郡國有辟舉庶㡬建侯之舊丞相進見御坐為起在輿為下庶㡬敬臣之意三老掌教化孝悌力田置常員鄉遂之流風遺韻亦間見焉是之取爾君子尚論古之人以為漢去古未逺諸儒佔畢訓故之學雖未盡識三代舊典而以漢制證遺經猶幸有傳注在也冕服車旗彛器之類多以叔孫通禮器制度為據其所臆度無以名之則謂若今某物及唐儒為疏義又謂去漢久逺雖漢法亦不可攷蓋自西晉板蕩之後見聞放失習俗流敗漢世之名物稱謂知者鮮焉况帝王制作之法象意義乎此漢制之僅存於傳注者不可忽不之攷也愚少嘗有聞老弗敢墜因紬次為編以俟後之君子自流遡源三代之禮庶乎其可識矣辛巳夏五王應麟序
