body:
  text: 漢制考卷二宋王應麟撰春官注鄭師農云唐虞歷三代以宗官典國之禮與其祭祀漢之大常是也疏代異法殊禮有㳂革故至漢時祭祀之禮使大常主之典瑞注瑞節信也典瑞若今符璽郎疏舉漢法而況之守祧奄八人注奄如今之宦者疏漢以奄人為內宦則名奄人為宦世婦每宫卿二人中士八人注世婦后宫官也王后六宫漢始大長秋詹事中少府大僕亦用士八人疏見周時用奄之義鞮鞻氏注鞮屨四夷舞者所屝也今時倡踏鼓㳫行者自有屝疏謂漢時倡優作樂踏地之人并擊鼓㳫㳫作聲者行自有屝屨證四夷舞者亦自有屝與中國不同也太宗伯疈辜注故書疈為罷鄭司農云罷辜披磔牲以祭若今時磔狗祭以止風疏舉漢法以況義狗屬西方金金制東方木之風故用狗止風也五命賜則注則地未成國之名王莽時以二十五成為則方五十里合今俗說子男之地獨劉子駿等識古有此制焉疏時有孟子張包周及何休等並不信周禮有五百里已下之國以王制百里七十里五十里等為周法故鄭指此等人為俗說也孤執皮帛注帛如今璧色繒也疏漢時有璧色繒故鄭舉而言之未知色之所定也小宗伯立軍社注社之主蓋用石為之疏案許慎云今山陽谷祠有石主甫竁注今南陽名穿地為竁肄儀為位注謂若今時肄司徒府也肆師治其禮儀注故書儀為義鄭司農義讀為儀古者書儀但為義今時所謂義為誼司尊彛皆有舟注鄭司農云舟尊下臺若今時承槃疏漢時酒尊下槃象周時尊下有舟故舉以為況也獻酌修酌注獻讀為摩莎之莎齊語聲之誤也修讀為滌濯之滌今齊人命浩酒曰滌司几筵黼依注斧謂之黼其繡白黑采綘帛為質依其制如屏風然疏屏風之名出於漢世鄭以今曉古故舉屏風為況也繅席次席注繅席削蒲蒻展之編以五采若今合歡矣次席桃枝席有次列成文疏漢有合歡席故舉漢法況之漢世以桃枝竹為席次第行列成文章紛純注紛如綬有文而狹者疏漢世綬是薄帔有文章而狹典瑞祼圭有瓉注漢禮瓉槃大五升口徑八寸下有槃口徑一尺疏此漢器制度文叔孫通所作珍圭注杜子春云珍當為鎮以徵召守國諸侯若今時徵郡守以竹使符也𤣥謂珍圭王使之瑞節如今時使者持節矣疏持節即子春所云竹使符也髙帝紀注節以毛為之上下相重取象竹節將命者持之以為信武帝紀征和元年更節加黃旄光武紀注節所以為信以竹為之柄長八尺以旄牛尾為其眊三重馮衍與田邑書今以一節之任建三軍之威豈特寵其八尺之竹犛牛之尾哉牙璋注鄭司農云以牙璋發兵若今時以銅虎符發兵疏銅虎竹使符漢時皇帝使者之瑞節漢齊王傳魏勃紿召平曰王欲發兵非有漢虎符驗也吳王傳弓髙侯責膠西王曰未有詔虎符擅發兵擊義國嚴助傳上曰新即位不欲出虎符發兵郡國乃遣助以節發兵會稽㑹稽守欲距法不為發司服韋辨服注韋辨以韎韋為辨又以為衣裳今時伍伯緹衣古兵服之遺色疏鄭韎為赤色韋猶以為疑故舉漢事以為況言伍伯者伍行也伯長也謂宿衛者之行長見服纁赤之衣是古兵服赤色遺象至漢時是其兵服赤之驗也奠衣服注今坐上魂衣也疏守祧云遺衣服藏焉至祭祀之時則出而陳於坐上冢人丘封之度注王公曰丘諸臣曰封漢律曰列侯墳髙四丈關內侯以下至庶人各有差疏周禮丘封髙下樹木之數無文以漢法況之也職喪注國之喪禮喪服士喪既夕士虞今存者其餘則亡疏儀禮三千條漢興惟得十七篇髙堂生所傳即今儀禮是也大司樂成均注董仲舒云成均五帝之學疏董仲舒作春秋繁露繁多露潤為春秋作義潤益處多弛縣注弛釋下之若今休兵鼓之為疏樂縣在於虡釋下之與兵鼓縣之於車上休亦釋下之義相似故舉今以況古樂師帗舞注帗析五采繒今靈星舞子持之是也皇舞注皇雜五采羽如鳯皇色持以舞疏漢世鳯皇數出五色行以肆夏趨以采薺注鄭司農云人君行步以肆夏為節趨疾於步則以采薺為節若今時行禮於太學罷出以鼓陔為節大胥掌學士之版以待致諸子注鄭司農云版籍也今時鄉户籍世謂之户版卿大夫之諸子則案此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及關內侯到五大夫子先取適子髙七尺已上年十二到年三十顔色和順身體修治者以為舞人與古用卿大夫子同義疏漢法卑者之子不得舞宗廟之酎則元士之子不入故知卿大夫之諸子也月令四月云天子與羣臣飲酎鄭注云酎之言醇謂重釀之酒春酒至此始成作此酎亦謂重釀之酒祭宗廟而用之祭末有相飲之法漢紀注云漢承秦爵二十等五大夫九爵關內侯十九爵列侯二十爵宗廟舞人用貴人子弟與周同故引以為證十二誤當云二十至三十卿大夫國中自七尺以及六十案韓詩二十從役與國中七尺同是七尺為二十矣不得為十二也小師簫管注簫編小竹管如今賣飴餳所吹者管如笛而小併兩而吹之今大豫樂官有焉鼗注如鼓而小持其柄搖之旁耳還自擊疏後鄭解鼗依漢法而知鐘師祴夏注杜子春云祴讀為陔鼓之陔疏漢有陔鼓之法樂師注鼓陔見上笙師笛管舂牘應雅注鄭司農云舂牘以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地應長六尺五寸其中有椎雅狀如漆筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫杜子春讀笛為蕩滌之滌今時所吹五空竹笛疏此皆約漢法知之旄人教舞散樂注散樂野人為樂之善者若今黃門倡矣疏不在官之員內謂之為散漢倡優之人亦非官樂之內故舉以為說也漢禮樂志成帝時鄭聲尤甚黃門名倡丙彊景武之屬富顯於世藝文志黃門倡車忠等歌詩十五篇占夢注以日月星辰占夢者其術則今八㑹其遺象也用占夢則亡疏按堪輿大㑹有八小㑹亦有八大祝六曰說注董仲舒救日食祝曰照照大明瀐滅無光奈何以隂侵陽卑侵尊是之謂說也九祭注鄭司農云衍祭羡之道中如今祭殤無所王命九􅉔注杜子春云竒讀為竒偶之竒謂先屈一膝今雅拜是也或云竒讀曰倚倚拜謂持節持㦸拜身倚之以拜鄭司農云褒拜今時持節拜是也肅拜但俯下手今時撎於至反即今之揖是也疏儀禮鄉飲酒賔客有撎入門之法推手曰揖引手曰撎左傳郤至敢肅使者注肅手至地若今撎字林云舉首下手也漢何武舉方正所舉者召見槃辟雅拜有司以為詭衆虛僞小祝置銘注鄭司農云銘書死者名於旌今謂之柩疏漢時謂銘為柩設道齎之奠注杜子春云齎當為粢道中祭也漢儀每街路輒祭疏引漢法為證後鄭不從者按既夕禮祖廟之庭禮道中無祭法甸祝禱牲注今侏大字也疏今漢時人傍侏是侏大之字司巫掌巫降之禮注巫下神之禮今世或死既斂就巫下其遺禮疏郊特牲鄉人鄭注云彊鬼彼逐疫癘之事此當家之鬼非彊鬼也女巫注嵗時祓除如今三月上巳如水上之類釁浴謂以香薰草藥沐浴疏一月有三已據上旬之已而為袚除之事見今三月三日水上戒浴是也大史正嵗年以序事注中數曰嵗朔數曰年中朔大小不齊正之以閠若今時作厯日矣抱天時注鄭司農云大史主抱式以知天時處吉凶疏據當時占文謂之式以其見時候有法式故謂載天文者為式藝文志有羡門式法馮相氏十有二嵗注嵗謂大嵗嵗星與日同次之月斗所建之辰樂說說嵗星與日常應大嵗月建以見然則今厯大嵗非此也疏以今厯大嵗嵗星北辰大嵗無跳辰之義非此經大嵗者也㑹天位注合此嵗日月辰星宿五者以為時事之候若今厯日大嵗在某月某日某甲朔日直音值某也保章氏星土注堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吳越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也此分野之妖祥主用客星彗孛之氣為象疏古黃帝時堪輿亡後代有作堪輿者非古數雖非古數時有可言者占夢注天地之㑹建厭所處之日辰疏堪輿天老曰假令正月陽建於寅隂建在戍張逸問厭對之義答曰案堪輿黃帝問天老事云四月陽建於已破於亥隂建於未破於癸是為陽破陰陰破陽故四月有癸亥為陰陽交㑹十月丁巳為隂陽交㑹藝文志堪輿金匱十四卷注許慎云堪天道輿地道也十有二嵗注嵗星為陽右行於天大嵗為陰左行於地十二嵗而小周其妖祥之占甘氏嵗星經其遺象也五雲之物注鄭司農云以二至二分觀雲色青為蟲白為喪赤為兵荒黑為水黃為豐疏蓋據陰陽書內史凡四方之事書內史讀之注若今尚書入省事疏漢法奏事讀之故舉以況之也霍光傳尚書令讀奏以方出之注杜子春云方直謂今時牘也疏古時名為方漢時名為牘故舉以說之外史達書名注古曰名今曰字使四方知書之文字得能讀之疏聘禮記云百名以上書之於策不滿百名書之於方古者之文字少直曰名後代文字多則曰字字者滋也滋益而多故更稱曰字御史掌贊書注贊為辭若今尚書作詔文疏謂若今出詔敕之書續漢百官志尚書侍郎三十六人一曹有六人主作文書起草安帝時陳忠上疏薦周興曰諸郎多文俗吏鮮有雅材每為詔文宣示內外轉相求請或以不能而專已自由辭多鄙固乃拜興尚書郎巾車注纓今馬鞅容蓋注鄭司農云容謂幨車山東謂之裳幃或曰潼容𤣥謂蓋如今小車蓋也疏此舉漢法小車有蓋以況周翟車有握注有握則此無蓋矣如今軿車是也疏漢法軿車無蓋故舉以況之蒲蔽注鄭司農云謂嬴蘭車以蒲為蔽天子喪服之車漢儀亦然疏漢時有嬴長蘭乘不善之車故舉以說之也藩蔽注藩今時小車藩漆席以為之良車散車注不在等者謂若今輜車後户之屬作之有功有沽疏漢時輜車與古者從軍所載輜重財貨之車皆車後開户故舉以說之典路注漢朝上計律陳屬車於庭疏漢朝集使上計律法謂上計㑹之法安帝紀永初四年春正月元日㑹徹樂不陳充庭車注每大朝㑹必陳乘輿法物車輦於庭以年饑故不陳司常九旗之物名各有屬注屬謂徽識也大傳謂之徽號令城門僕射所被及亭長著綘衣皆其舊象疏引今漢法欲見古有此物遺及漢時也司爟注爟讀如豫若觀火之觀今燕俗名湯熱為觀則爟火謂熱火與司甲注甲今之鎧也疏今古用物不同其名亦異古用皮謂之甲今用金謂之鎧從金為字也司戈盾注戈今時句孑㦸疏漢時見戈有旁出者為句孑亦名胡孑故號戈為胡孑㦸也句古侯字大司馬師帥執提注鄭司農云提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提疏據當時已有單騎舉以況周其實周時皆乘車無輕騎法也曲禮前有車騎則載飛鴻正義古人不騎馬經典無言騎者今言騎者當是周末時禮左傳正義六國之時始有單騎左師展將以公乘馬而歸此騎馬之漸也誓民注誓以犯田法之罰也誓曰無干車無自後射疏此據漢田律而言左右和之門注軍門曰和今謂之壘門立兩旌以為之疏漢時軍壘為門名曰壘門與古和門同故舉為說司勳祭於大蒸注今漢祭功臣於廟庭疏引漢法欲見古者祭功臣在廟庭也漢舊儀宗廟祭功臣四十人食堂下惟御僕滕公祭於廟門外孰加田注鄭司農云祿田亦有給公家之賦貢若今時侯國有司農少府錢穀矣疏漢法穀入司農錢入少府故舉以為況掌固設其飾器注兵甲之屬今城郭門之器亦然疏漢時城郭門守器所飾亦若今城郭門傍所執矛㦸皆有幡飾之等挈壺氏分以日夜注異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉大史立成法有四十八箭疏馬氏云漏凡百刻春秋分晝夜各五十刻冬至晝則四十刻夜則六十刻夏至晝六十刻夜四十刻鄭注堯典云日中者日見之漏與不見者齊日長者日見之漏五十五刻於四時最長也夜中者日不見之漏與見者齊日短者日見之漏四十五刻於四時最短此與馬義異以其馬云春秋分晝夜五十刻據日見之漏若兼日未見日沒後五刻晝五十五刻夜四十五刻若夏至晝六十刻通日未見日沒後五刻則晝六十五刻夜三十五刻一年通閏有三百六十五日四分日之一四時之間九日有餘較一刻為率云大史立成法有四十八箭者此據漢法而言則以器盛四十八箭箭各百刻以壺盛水懸於箭上節而下之水水淹一刻則為一刻四十八箭者蓋取倍二十四氣也書正義漢初率九日增減一刻和帝時霍融始請改之鄭注書緯考靈曜仍云九日增減猶未覺誤也續漢厯志永元十四年詔曰今官漏以計率分昏明九日增減一刻違失其實大史待詔霍融上言不與天相應令下晷景漏刻四十八箭立成式官府當用者計吏到班豫四十八箭射人射牲注今立秋有貙劉云疏漢時苑中有貙劉即爾雅貙似貍劉殺也云立秋貙殺物武帝紀膢五日注如淳曰漢儀注立秋貙膢蘇林曰膢祭名貙虎屬常以立秋日祭獸王者亦以此日出獵還以祭宗廟故有貙膢之祭顔師古曰續漢書作貙劉膢劉義通法言膢臘注膢八月旦也今河東俗奉以為大節祭祀先人也羅氏注今俗放火張羅其遺教疏漢之俗間在上放火於下張羅丞之以取禽獸是周禮之遺教羅春鳥注若今南郡黃雀之屬方相氏注冒熊皮者以驚驅疫厲之鬼如今魌頭也驅方良注天子之椁柏黃腸為裏而表以石焉疏引漢法為證霍光傳注如淳曰漢儀注天子陵中明中高丈二尺四寸周二丈內梓宫次楩椁柏黃腸題湊蘇林曰柏木黃心故曰黃腸大僕大寢之門外注大寢路寢也其門外則內朝之中如今宫殿端門下矣達窮者與遽令注鄭司農云窮謂窮寃失職則來擊此鼓以達於王若今時上變事擊鼓矣遽傳也若今時驛馬軍書當急聞者亦擊此鼓前驅注前驅如今道引也小臣燕出入則前驅注燕出入若今游於諸觀苑疏引漢法證之隸僕掌蹕宫門之事注鄭司農云蹕謂止行者清道若今時警蹕辨師延紐注延冕之覆在上是以名焉紐小鼻在武上笄所貫也今時冠卷當簪者廣袤以冠縰其舊象與疏古之紐武笄貫交處若今漢時冠卷當簪所貫者於上下之廣及隨縰之袤以冠縰者貫簪之處當冠縰之中央是周冕垂紐於武貫笄之舊象以無正文故云與以疑之凡冕體周禮無文叔孫通作漢禮器制度取法於周今還取彼以釋之案彼文凡冕以版廣八寸長尺六寸以上𤣥下朱覆之乃以五綵繅繩貫五采玉垂於延前後謂之邃延繅斿注鄭司農云繅當為藻繅古字也藻今字也同物同音會五采注鄭司農云沛國人謂反紒為䯤𤣥謂㑹讀如大㑹之㑹疏漢歷有大㑹小㑹取㑹聚之意玉璂注璂讀如薄借綦之綦綦結也疏漢時有薄借綦之語故讀從之亦取結義薄借之語未聞司戈盾設藩盾注藩盾盾可以藩衛者如今之扶蘇與疏舉漢法以況之司弓矢枉矢注枉矢者取名變星飛行有光今之飛矛是也疏案援神契云枉矢射慝考異郵曰枉矢精狀如流星蛇行有尾見天文志曰狀大流星是其妖變之星行時有光漢時名此矢為飛矛故舉以為說也廋人注鄭司農云散讀為中散大夫之散圉師注杜子春讀椹為齊人言鐵椹之椹職方氏天下之圗注天下之圖如今司空輿地圗也疏大司徒掌九州不言夷狄九州之內有邦國故以郡國言之此職方兼主夷狄夷狄中漢時不置郡國惟置校尉掌之故此注亦不言郡國也司圜注鄭司農云圜土謂獄城也今獄城圜疏東方主規規主仁恩凡斷獄以仁恩求出之故圜也司隸注隸給勞辱之役者漢始置司隸亦使將徒治道溝渠之役後稍尊之使主官府及近郡疏以漢時司隸官與周同故舉以為況也萍氏注今天問萍號作蘋疏離騷有天問篇天不可問故以天問為名冥氏注鄭司農云𡨕讀為𡨕氏春秋之𡨕疏冥氏作春秋書名若晏子吕氏春秋之類取其音讀也漢儒林傳堂溪惠授泰山冥都都與管路又事顔安樂故顔氏復有管冥之學冥氏春秋即冥都也疏恐誤剃氏注鄭司農云今俗間謂麥下為夷下言芟夷其麥以其下種禾豆也蟈氏注蟈今御所食蛙也霍山曰丞相擅減宗廟羔莵蛙伊耆氏注今姓有伊耆氏也大司寇兩劑注劑今劵書也欲有復於上注復猶報也報之者若上書詣公府言事矣以邦成弊之鄭司農云邦成謂若今時決事比也疏若今律其有斷事皆依舊事斷之其無條取比類以決之故云決事比也晉志漢時決事集為令甲以下三百餘篇小司寇讀書則用法注鄭司農云如今時讀鞫已乃論之疏鞫謂劾囚之要辭讀已乃論其罪也八辟注鄭司農云議親若今時宗室有罪先請是也議賢若今時廉吏有罪先請是也議貴若今時吏墨綬有罪先請是也疏漢法丞相中二千石金印紫綬御史大夫二千石銀印青綬縣令六百石銅印墨綬前王而辟注鄭司農云小司寇為王道辟除姦人也若今時執金吾下至令尉奉引矣疏漢時執金吾及令尉為帝奉引猶如小司寇為王導故引以為況士師五禁注古之禁書亡矣今宫門有符籍官府有無故擅入城門有離載下帷野有田律軍有囂歡夜行之禁其粗可言者疏舉漢法以況之在車離耦載而下帷恐是姦非故禁之三曰禁注禁則軍禮曰無干車無自後射比其類也追胥注胥讀如宿偦之偦偦謂司搏盜賊也疏時有夜宿逐賊謂之偦士之八成注鄭司農云八成者行事有八篇若今時決事比疏凡言成者皆舊有成事品式後人依而行之決事依前比類決之邦汋注鄭司農云斟酌盜取國家密事若今時刺探尚書事疏漢時尚書掌機密有刺探尚書密事斟酌私知故舉為況也詔司寇注若今曰聽正法解也傅別注故書别為辨鄭司農云傅或為符辨讀為風别之别若今時市買為劵書以别之各得其一訟則案劵以正之鄉士辨其獄訟異其死刑之罪而要之注要之為其罪法之要辭如今劾矣疏劾實也左傳疏漢世名斷獄為劾士師受中協日注鄭司農云協和合支幹善日若今時望後利日也士師受中若今二千石受其獄也疏漢時受二千石祿稟郡守之等受在下已成之獄利日即合刑殺之日三公若有邦事則為之前驅而辟注鄭司農云鄊士為三公道也若今時三公出城郡督郵盜賊道也疏郵謂郵行往來盜賊謂舊為盜賊即不良之人故郡內督察郵行者是盜賊之人使之道以況古鄊士為道相類也訝士有治於士者造焉注如今郡國亦時遣主者吏詣廷尉議者疏漢時獄官號廷尉四方有亂獄則往而成之注猶吕步舒使治淮南獄疏吕步舒明春秋公羊為丞相長史淮南王反武帝詔使宗正劉德與步舒窮驗其事朝士外朝之法注雉門設兩觀與今之宫門同疏舉漢以況周今司徒府有天子以下大㑹殿亦古之外朝哉疏舉漢法況義得獲貨賄人民六畜者注鄭司農云若今時得遺物及放失六畜持詣鄉亭縣廷大者公之大物沒入公家也小者私之小物自畀也期外不聽注鄭司農云若今時徒論決滿三月不得乞鞫有判書注鄭司農云謂若今時辭訟有劵書者為治之犯令者注若今時加貴取息坐臧殺之無罪注鄭司農云若今時無故入人室宅廬舍上人車船牽引人欲犯法者其時格殺之無罪疏先鄭舉漢賊律云晉志魏李悝著法經其律始於盜賊鹽鐵論一尺四寸之律古今一也或以治或以亂司民皆書於版注版今户籍也司刑注今東西夷或以墨劓為俗古刑人亡逃者之世類與宫若今宦男女也鄭司農云漢孝文帝十三年除肉刑疏宦男女即宮人婦女及奄人使守內閣者也文帝赦肉刑所赦者唯赦墨劓與刖三者其宮刑至隋乃赦也書呂刑正義漢除肉刑除墨劓剕耳宫刑猶在隋開皇之初始除男子宫刑婦人猶閉於宫詔刑罰法處其所應不如今律家所署法矣司刺三宥注鄭司農云過失若今律過失殺人不坐死𤣥謂識審也不審若今仇讐當殺甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺忘若間帷薄忘有在焉者而以兵矢投射之疏甲乙者興喻之之義三赦注鄭司農云幼弱老旄若今時律令年未滿八歲八十以上非手殺人他皆不坐司約丹圗注丹圗未聞或有雕器簠簋之屬有圗象者與今俗語有鐵劵丹書豈此舊典之遺言與職金楬而璽之注鄭司農云今時之書有所表識謂之楬櫫疏楬即今之板金罰疏夏侯歐陽說云墨罰疑赦其罰百率古以六兩為率古尚書說百鍰鍰者率也一率十一銖二十五分銖之十三也百鍰為三斤鄭𤣥以為古之率多作鍰蕭望之傳張敞曰甫刑之罰小過赦薄罪贖有金選之品注選音刷字本作鋝鋝即鍰也其重十一銖二十五銖之十三一曰重六兩用金石注作槍雷音誄椎椁宅耕反之屬疏皆謂守城禦捍之具司屬掌任器貨賄入于司兵注鄭司農云若今時傷殺人所用兵器盜賊臧加責沒入縣官疏加責者即今時倍臧其奴注鄭司農云今之為奴婢古之罪人也𤣥謂奴從坐而沒入縣官者疏漢時名官為縣官非謂州縣也史記索隱云夏家王畿內名縣內即國都也王者官天下故曰縣官司圜任之以事注鄭司農云若今時罰作矣史記馮唐傳雲中守魏尚削其爵罰作之掌戮注斬以鈇鉞若今要斬也殺以刀刃若今棄市也宫者使守內注以其人道絶也今世或然野廬氏比修除道路者注比較治道者名若今次金敘丈功疏謂漢時主役之官官名次金敘主以丈尺賦功凡道禁注禁謂若今絶䝉大巾持兵杖之屬疏古時禁書亡故舉漢法而言也蠟氏置楬焉注鄭司農云今時楬櫫是也有地之官有部界之吏今時鄉亭是也司寤氏掌夜時注夜時謂夜晚早若今甲乙至戌疏甲乙則早時戌亥則晚時也疏以戊為戌誤甲乙至戊謂夜有五更西域傳杜欽曰斥候士五分夜擊刁斗自守一夜有五更故分而持之天文志有甲夜乙夜袁宏漢舊儀晝漏盡夜漏起省中用火中黃門闕五夜甲夜乙夜丙夜丁夜戊夜相傳授守火闕內户外鼓五止宫中衛官城門擊刁斗傳五夜百官各徼直符行衛士周廬擊木柝唯呼備夜士注主行夜徼候者如今都候之屬疏行夜來往周旋謂徼候者司烜氏以鑒取明水於月注鑒鏡屬取水者世謂之方諸疏漢世謂之方諸明竁注若今楬頭明書其罪法也條狼氏執鞭以趨辟注趨而辟行人若今卒辟車之為庶氏毒蠱注賊律曰敢蠱人及教令者棄市剃氏春始生而萌之夏日至而夷之秋繩而芟之注萌之者以兹其斫其生者夷之以鉤鐮迫地芟之也若今取菱矣疏漢時兹其即今之鋤也蟈氏注齊魯之間謂蛙為蟈伊耆氏齒杖注鄭司農云今時亦命之為工杖大行人諭書名注書名書之字也古曰名聘禮曰書名以上小行人秋獻功注若今計文書斷於九月其舊法管節注如今之竹使符也賻補注鄭司農云若今時一室二尸則官與之棺也司儀旅擯注旅讀為鴻臚之臚行夫傳遽注傳遽若今時乘傳騎驛而使者也掌訝次于舍門外注次如今官府門外更衣處疏舉漢法以況之即今門外亦然考工記注胡今胸奴鮑書或為鞄蒼頡篇有鞄疏藝文志蒼頡有七章秦丞相李斯所作鞄是其一篇內有治皮之事故引為證也既建而迆注鄭司農云迆讀為倚移從風之移疏司馬長卿上林賦云戚速注齊人有名疾為戚者終古注齊人之言終古猶言常也轐注鄭司農云轐讀為旃僕之僕謂伏兔也疏伏兔漢時名今人謂之車屐是也輪人三材注今世轂用雜榆輻以檀牙以橿也疏鄭舉今世所用木為此三者牙也者注鄭司農云謂輪輮也世間或謂之罔視其綆注鄭司農云綆讀為關東言餅之餅疏依俗讀也察其菑注鄭司農云菑讀如雜厠之厠泰山平原所樹立物為菑博立梟棊亦為菑疏史游章分别部居不雜厠博戲時立一子於中央謂之梟棊為之弱注今人謂蒲本在水中者為弱疏史游章云蒲蒻蘭席謂取蒲之本在水者為席𣙗注鄭司農云蜀人言摋曰𣙗弓注蓋橑也疏漢世名蓋弓為橑子也輈人緧其牛後注鄭司農云關東謂紂為緧築氏為削注今之書刀疏古者未有紙筆則以削刻字至漢雖有紙筆仍有書刀是古之遺法也漢書刀筆吏注刀所以削書古者用簡牒故吏皆以刀筆自隨冶氏戈廣二寸注戈今句孑㦸也或謂之雞鳴或謂之擁頸鋌讀如麥秀鋌之鋌疏據漢法而言漢時見胡橫之句孑㦸雞鳴者以其胡似雞鳴故也擁頸者以其胡曲故謂之擁頸有此數名也倨句注俗謂之曼胡似此疏胡外廣而本寬曼胡然案莊公四年左氏傳楚武王荆尸授師子焉以伐隨注孑句孑凡㦸而無刃秦晉之間謂之子或謂之鏕吳揚之間謂之伐東齊秦晉之間其大者謂之曼胡其曲者謂之句子曼胡重三鋝注許叔重說文解字云鋝鍰也今束萊稱或以大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣則三鋝為一斤四兩疏鋝鍰輕重無文故王肅之徒皆以六兩為鍰是以鄭引許氏及東萊稱為證也㦸注今三鋒㦸也疏三鋒者見此經言援言胡又言刺桃氏謂之下制注下制長二尺重一斤一兩三分兩之一此今之匕首也疏漢時名此小劒為匕首也鳬氏鍾縣謂之旋注今時旋有蹲熊盤龍辟邪疏舉漢法鍾旋之上以銅篆作蹲熊及盤龍辟邪辟邪亦獸名古法亦當然也篆間謂之枚注今時鍾乳俠鼓與舞每處有九面三十六疏舉漢法一帶有九古法亦當然鍾有兩面面皆三十六也㮚氏量之以為釜注釜六斗四升也釜十則鍾方尺積千寸於今粟米法少二升八十一分升之二十二其數必容釜此言大方耳疏算術有算粟為米之法畫繢山以章注齊人謂麇為獐五入為緅注緅今禮俗文作爵言如爵頭色也㡛氏漚其絲注楚人曰漚齊人曰涹玉人侯用瓉注瓉讀為􅊡之作旦反疏醢人職有􅊡食漢時有膏􅖸玉多則重石多則輕疏盈不足術曰玉方寸重七兩石方寸重六兩大圭注終葵椎也相玉書曰珽玉六寸明自照疏齊人謂椎為終葵祼圭注瓉如盤其柄用圭有流前注矢人夾而搖之注今人以指夾矢儛衛是也梓人顧注鄭司農云讀為鬝頭無髮之鬝疏時俗有以無髮為鬝觚三升注觚當為觶疏禮器制度云觚大二升觶大三升廬人句兵椑注齊人謂柯斧柄為禆匠人四阿重屋注四阿若今四注屋重屋復笮也疏燕禮云設洗當東霤則此四阿四霤者也復笮重承壁材上林賦髙廊四注大扃小扃注大扃牛鼎之扃長三尺小扃膷鼎之扃長二尺疏此約漢禮器制度知之外有九室注九室如今朝堂諸曹治事處疏據漢法謂正朝之左右為廬舍者也宮隅城隅注謂角浮思也疏鄭以浮思解隅者案漢時云東闕浮思災言災則浮思者小樓也明堂位疏屏注亦云今浮思也刻之為雲氣蟲獸如今闕上為之矣則門屏有屋覆之與城隅及闕皆有浮思刻畫為雲氣并蟲獸文帝紀未央宫東闕罘罳災顔師古注罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也王莽傳遣使壞渭陵延陵園門罘罳曰毋使民復思也耜廣五寸注古者耜一金兩人併發之今之耜歧頭兩金象古之耦也疏後漢用牛耕種故有歧頭兩腳耜今猶然也但以牛種用一耜則畎下布種與古異矣堂涂注謂階前若今令甓祴也疏漢時名堂涂為令甓祴令甓則今之磚也祴則磚道也令音零甓薄厯反祴音階車人一欘有半謂之柯注鄭司農云蒼頡篇有柯欘車人為耒疏古法耒下惟一金不歧頭先鄭云耒下歧據漢法而言其實古者耒不歧頭是以後鄭上注亦云今之耜歧頭以其一為之首注首六寸謂今剛關頭斧疏漢時斧近刃皆以剛鐵為之又以柄關孔即今亦然故舉漢法為說也羊車注羊善也善車若今定張車疏雖舉當時漢法以曉人漢世去今久逺亦未知定張車將何所用但知在宫內所用故差小為之謂之羊車也弓人茭解注茭讀如齊人名手足掔為骹之骹故剽注鄭司農云剽讀為湖漂絮之漂疏時有此語從俗讀之樴脂膏䐈敗之䐈疏若今人頭髮有脂膏者則謂之䐈漢制考卷二
